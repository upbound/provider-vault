apiVersion: aws.vault.m.upbound.io/v1alpha1
kind: AuthBackendClient
metadata:
  annotations:
    meta.upbound.io/example-id: aws/v1alpha1/authbackendclient
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    accessKeySecretRef:
      key: example-key
      name: example-secret
    backendSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    secretKeyWoSecretRef:
      key: example-key
      name: example-secret
    secretKeyWoVersion: 1

---

apiVersion: auth.vault.m.upbound.io/v1alpha1
kind: Backend
metadata:
  annotations:
    meta.upbound.io/example-id: aws/v1alpha1/authbackendclient
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    type: aws
