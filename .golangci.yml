version: "2"

linters:
  default: none
  enable:
    - errcheck
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - gosimple
    - govet
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false

    revive:
      confidence: 0.8

    gocyclo:
      min-complexity: 10

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 5

    lll:
      tab-width: 1

    unparam:
      check-exported: false

    nakedret:
      max-func-lines: 30

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    gocritic:
      enabled-tags:
        - performance
      settings:
        captLocal:
          paramsOnly: true
        rangeValCopy:
          sizeThreshold: 32

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Exclude some linters from running on tests files.
      - path: _test(ing)?\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - unparam

      # Ease some gocritic warnings on test files.
      - path: _test\.go
        text: "(unnamedResult|exitAfterDefer)"
        linters:
          - gocritic

      # These are performance optimisations rather than style issues per se.
      - text: "(hugeParam|rangeValCopy):"
        linters:
          - gocritic

      # This "TestMain should call os.Exit to set exit code" warning is not clever
      # enough to notice that we call a helper method that calls os.Exit.
      - text: "SA3000:"
        linters:
          - staticcheck

      - text: "k8s.io/api/core/v1"
        linters:
          - goimports

      # This is a "potential hardcoded credentials" warning. It's triggered by
      # any variable with 'secret' in the same, and thus hits a lot of false
      # positives in Kubernetes land where a Secret is an object type.
      - text: "G101:"
        linters:
          - gosec

      # This is an 'errors unhandled' warning that duplicates errcheck.
      - text: "G104:"
        linters:
          - gosec

run:
  timeout: 60m
  concurrency: 3

output:
  show-stats: true

issues:
  new: false
  max-issues-per-linter: 0
  max-same-issues: 0
