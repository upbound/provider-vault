    vault_azure_secret_backend_role:
        subCategory: ""
        description: Creates an azure secret backend role for Vault.
        name: vault_azure_secret_backend_role
        title: vault_azure_secret_backend_role resource
        examples:
            - name: generated_role
              manifest: |-
                {
                  "azure_roles": [
                    {
                      "role_name": "Reader",
                      "scope": "/subscriptions/${var.subscription_id}/resourceGroups/azure-vault-group"
                    }
                  ],
                  "backend": "${vault_azure_secret_backend.azure.path}",
                  "max_ttl": 600,
                  "metadata": {
                    "owner": "vault",
                    "team": "test"
                  },
                  "role": "generated_role",
                  "sign_in_audience": "AzureADMyOrg",
                  "tags": [
                    "team:engineering",
                    "environment:development"
                  ],
                  "ttl": 300
                }
              references:
                backend: vault_azure_secret_backend.azure.path
              dependencies:
                vault_azure_secret_backend.azure: |-
                    {
                      "client_id": "${var.client_id}",
                      "client_secret": "${var.client_secret}",
                      "subscription_id": "${var.subscription_id}",
                      "tenant_id": "${var.tenant_id}"
                    }
            - name: existing_object_id
              manifest: |-
                {
                  "application_object_id": "11111111-2222-3333-4444-44444444444",
                  "backend": "${vault_azure_secret_backend.azure.path}",
                  "max_ttl": 600,
                  "role": "existing_object_id",
                  "ttl": 300
                }
              references:
                backend: vault_azure_secret_backend.azure.path
              dependencies:
                vault_azure_secret_backend.azure: |-
                    {
                      "client_id": "${var.client_id}",
                      "client_secret": "${var.client_secret}",
                      "subscription_id": "${var.subscription_id}",
                      "tenant_id": "${var.tenant_id}"
                    }
        argumentDocs:
            application_object_id: |-
                - (Optional) Application Object ID for an existing service principal that will
                be used instead of creating dynamic service principals. If present, azure_roles and permanently_delete will be ignored.
            azure_groups: '- (Optional) List of Azure groups to be assigned to the generated service principal.'
            azure_roles: '- (Optional) List of Azure roles to be assigned to the generated service principal.'
            backend: '- (Optional) Path to the mounted Azure auth backend'
            explicit_max_ttl: '- (Optional) Specifies the explicit maximum lifetime of the lease and service principal generated using this role. If not set or set to 0, will use the system default (10 years). Requires Vault 1.18+.'
            max_ttl: |-
                – (Optional) Specifies the maximum TTL for service principals generated using this role. Accepts time
                suffixed strings ("1h") or an integer number of seconds. Defaults to the system/engine max TTL time.
            metadata: |-
                – (Optional) A map of string key-value pairs that are stored alongside the role and returned with generated
                credentials.
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            permanently_delete: |-
                - (Optional) Indicates whether the applications and service principals created by Vault will be permanently
                deleted when the corresponding leases expire. Defaults to false. For Vault v1.12+.
            persist_app: '- (Optional) If set to true, persists the created service principal and application for the lifetime of the role'
            role: '- (Required) Name of the Azure role'
            sign_in_audience: |-
                - (Optional) Specifies the security principal types that are allowed to sign in to the application.
                Valid values are: AzureADMyOrg, AzureADMultipleOrgs, AzureADandPersonalMicrosoftAccount, PersonalMicrosoftAccount. Requires Vault 1.16+.
            tags: '- (Optional) - A list of Azure tags to attach to an application. Requires Vault 1.16+.'
            ttl: |-
                – (Optional) Specifies the default TTL for service principals generated using this role.
                Accepts time suffixed strings ("1h") or an integer number of seconds. Defaults to the system/engine default TTL time.
        importStatements: []
    vault_azure_secret_backend_static_role:
        subCategory: ""
        description: Creates a static role for Vault Azure Secrets engine
        name: vault_azure_secret_backend_static_role
        title: vault_azure_secret_backend_static_role resource
        examples:
            - name: static-role
              manifest: |-
                {
                  "application_object_id": "11111111-2222-3333-4444-44444444444",
                  "backend": "${vault_azure_secret_backend.azure.path}",
                  "metadata": {
                    "owner": "vault",
                    "team": "test"
                  },
                  "role": "static-role",
                  "ttl": "8760h"
                }
              references:
                backend: vault_azure_secret_backend.azure.path
              dependencies:
                vault_azure_secret_backend.azure: |-
                    {
                      "client_id": "${var.client_id}",
                      "client_secret": "${var.client_secret}",
                      "subscription_id": "${var.subscription_id}",
                      "tenant_id": "${var.tenant_id}"
                    }
        argumentDocs:
            application_object_id: |-
                - (Required) The Azure AD Application Object ID associated with the existing application whose
                credentials Vault will manage.
            backend: '- (Required) Path where the Azure Secrets Engine is mounted.'
            client_secret: |-
                - (Optional, Sensitive) When importing an existing credential, provides the existing client secret
                value.
            defer_initial_creds: |-
                - (Optional, Bool) - If true, the initial credential generation will be deferred until the
                first read of credentials from this role. Defaults to false.
            expiration: |-
                - (Optional) Deprecated - Expiration timestamp (UTC, RFC3339 format) of the existing credential being imported.
                Vault reads expiration from Azure.
            metadata: |-
                – (Optional) A map of string key-value pairs that are stored alongside the role and returned with generated
                credentials.
            namespace: |-
                - (Optional) The namespace of the target resource.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's
                configured namespace.
                Available only for Vault Enterprise.
            role: '- (Required) Name of the static role to create or manage.'
            secret_id: '- (Optional) When importing an existing credential, specifies the Azure secret’s key ID.'
            skip_import_rotation: |-
                - (Optional, Bool) - If true, Vault will import the provided credential without performing
                rotation. Valid only during creation. Defaults to false.
            ttl: |-
                – (Optional) Duration that defines the validity period of the managed credential. Defaults to 2 years. Must be
                at least 1 month.
                Accepts an integer number of seconds (31536000). Defaults to the system/engine default TTL time.
        importStatements: []
    vault_cert_auth_backend_role:
        subCategory: ""
        description: Managing roles in an Cert auth backend in Vault
        name: vault_cert_auth_backend_role
        title: vault_cert_auth_backend_role resource
        examples:
            - name: cert
              manifest: |-
                {
                  "allowed_names": [
                    "foo.example.org",
                    "baz.example.org"
                  ],
                  "backend": "${vault_auth_backend.cert.path}",
                  "certificate": "${file(\"/path/to/certs/ca-cert.pem\")}",
                  "name": "foo",
                  "token_max_ttl": 600,
                  "token_policies": [
                    "foo"
                  ],
                  "token_ttl": 300
                }
              references:
                backend: vault_auth_backend.cert.path
              dependencies:
                vault_auth_backend.cert: |-
                    {
                      "path": "cert",
                      "type": "cert"
                    }
        argumentDocs:
            alias_metadata: |-
                - (Optional) The metadata to be tied to generated entity alias.
                This should be a list or map containing the metadata in key value pairs.
            allowed_common_names: '- (Optional array: []) Allowed the common names for authenticated client certificates'
            allowed_dns_sans: '- (Optional array: []) Allowed alternative dns names for authenticated client certificates'
            allowed_email_sans: '- (Optional array: []) Allowed emails for authenticated client certificates'
            allowed_names: '- (Optional string) DEPRECATED: Please use the individual allowed_X_sans parameters instead. Allowed subject names for authenticated client certificates'
            allowed_organizational_units: '- (Optional array: []) Allowed organization units for authenticated client certificates.'
            allowed_uri_sans: '- (Optional array: []) Allowed URIs for authenticated client certificates'
            backend: '- (Optional string: "cert") Path to the mounted Cert auth backend'
            certificate: '- (Required string) CA certificate used to validate client certificates'
            display_name: '- (Optional string: "") The name to display on tokens issued under this role.'
            name: '- (Required string) Name of the role'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            ocsp_ca_certificates: |-
                (Optional string: "") Any additional CA certificates
                needed to verify OCSP responses. Provided as base64 encoded PEM data.
                Requires Vault version 1.13+.
            ocsp_enabled: |-
                (Optional bool: false) - If enabled, validate certificates'
                revocation status using OCSP. Requires Vault version 1.13+.
            ocsp_fail_open: |-
                (Optional bool: false) - If true and an OCSP response cannot
                be fetched or is of an unknown status, the login will proceed as if the
                certificate has not been revoked.
                Requires Vault version 1.13+.
            ocsp_max_retries: |-
                (Optional int: 4) - The number of retries to attempt when
                connecting to an OCSP server. Defaults to 4 retries.
                Must be a non-negative value. Requires Vault version 1.16+.
            ocsp_query_all_servers: |-
                (Optional bool: false) - If set to true, rather than
                accepting the first successful OCSP response, query all servers and consider
                the certificate valid only if all servers agree.
                Requires Vault version 1.13+.
            ocsp_servers_override: |-
                (Optional array: []): A comma-separated list of OCSP
                server addresses. If unset, the OCSP server is determined from the
                AuthorityInformationAccess extension on the certificate being inspected.
                Requires Vault version 1.13+.
            ocsp_this_update_max_age: |-
                (Optional int: 0) - The maximum age in seconds of the
                'thisUpdate' field in an OCSP response before it is considered too old.
                Defaults to 0 (disabled). Must be a non-negative value.
                Requires Vault version 1.16+.
            required_extensions: |-
                - (Optional array: []) TLS extensions required on
                client certificates
            token_bound_cidrs: |-
                - (Optional) List of CIDR blocks; if set, specifies blocks of IP
                addresses which can authenticate successfully, and ties the resulting token to these blocks
                as well.
            token_explicit_max_ttl: |-
                - (Optional) If set, will encode an
                explicit max TTL
                onto the token in number of seconds. This is a hard cap even if token_ttl and
                token_max_ttl would otherwise allow a renewal.
            token_max_ttl: |-
                - (Optional) The maximum lifetime for generated tokens in number of seconds.
                Its current value will be referenced at renewal time.
            token_no_default_policy: |-
                - (Optional) If set, the default policy will not be set on
                generated tokens; otherwise it will be added to the policies set in token_policies.
            token_num_uses: |-
                - (Optional) The maximum number
                of times a generated token may be used (within its lifetime); 0 means unlimited.
            token_period: |-
                - (Optional) If set, indicates that the
                token generated using this role should never expire. The token should be renewed within the
                duration specified by this value. At each renewal, the token's TTL will be set to the
                value of this field. Specified in seconds.
            token_policies: |-
                - (Optional) List of policies to encode onto generated tokens. Depending
                on the auth method, this list may be supplemented by user/group/other values.
            token_ttl: |-
                - (Optional) The incremental lifetime for generated tokens in number of seconds.
                Its current value will be referenced at renewal time.
            token_type: |-
                - (Optional) The type of token that should be generated. Can be service,
                batch, or default to use the mount's tuned default (which unless changed will be
                service tokens). For token store roles, there are two additional possibilities:
                default-service and default-batch which specify the type to return unless the client
                requests a different type at generation time.
        importStatements: []
    vault_cf_auth_backend_config:
        subCategory: ""
        description: Manages the configuration for the CloudFoundry auth backend in Vault.
        name: vault_cf_auth_backend_config
        title: vault_cf_auth_backend_config resource
        examples:
            - name: config
              manifest: |-
                {
                  "cf_api_addr": "https://api.my-cf.example.com",
                  "cf_password_wo": "${var.cf_password}",
                  "cf_password_wo_version": 1,
                  "cf_username": "admin",
                  "identity_ca_certificates": [
                    "${trimspace(file(\"ca.pem\"))}"
                  ],
                  "login_max_seconds_not_before": 300,
                  "mount": "${vault_auth_backend.cf.path}"
                }
              references:
                cf_password_wo: var.cf_password
                mount: vault_auth_backend.cf.path
              dependencies:
                vault_auth_backend.cf: |-
                    {
                      "path": "cf",
                      "type": "cf"
                    }
        argumentDocs:
            cf_api_addr: |-
                - (Required) The full API address of the CF deployment, used to
                verify that a given CF_INSTANCE_CERT references an application, space, and
                organization that currently exist.
            cf_api_trusted_certificates: |-
                - (Optional) A set of PEM-encoded certificates
                presented by the CF API. Configures Vault to trust these certificates when
                making API calls.
            cf_password_wo: |-
                - (Required) The password for authenticating to the CF API.
                This attribute is write-only and is never stored in Terraform state. It is sent
                to Vault on create and on every update. Because Terraform cannot detect changes
                to write-only values, increment cf_password_wo_version to trigger an update
                when only this password changes.
            cf_password_wo_version: |-
                - (Required) Version counter for cf_password_wo.
                Increment this value to trigger an update when only the write-only password changes.
            cf_timeout: |-
                - (Optional) The timeout for CF API calls in seconds. Defaults to
                0 (no timeout). Removing this field from your configuration resets the value
                to 0 in Vault. Requires Vault 1.19.4 or later due to a bug fix in that release.
            cf_username: '- (Required) The username for authenticating to the CF API.'
            identity_ca_certificates: |-
                - (Required) A set of root CA PEM certificates used
                to verify that CF_INSTANCE_CERT presented at login was issued by the proper
                authority.
            login_max_seconds_not_after: |-
                - (Optional, Computed) The maximum number of
                seconds in the future when a login signature could have been created. Defaults
                to 60. Because this field is Computed, removing it from your configuration
                does not reset the value in Vault — Vault retains whatever was previously
                set. To reset to the default, set the field explicitly to 60.
            login_max_seconds_not_before: |-
                - (Optional, Computed) The maximum number of
                seconds in the past when a login signature could have been created. Defaults
                to 300. Because this field is Computed, removing it from your configuration
                does not reset the value in Vault — Vault retains whatever was previously
                set. To reset to the default, set the field explicitly to 300.
            mount: '- (Required) The mount path for the CF auth engine in Vault.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
        importStatements: []
    vault_cf_auth_backend_role:
        subCategory: ""
        description: Manages roles for the CloudFoundry auth backend in Vault.
        name: vault_cf_auth_backend_role
        title: vault_cf_auth_backend_role resource
        examples:
            - name: role
              manifest: |-
                {
                  "bound_organization_ids": [
                    "org-uuid-1"
                  ],
                  "bound_space_ids": [
                    "space-uuid-1"
                  ],
                  "disable_ip_matching": true,
                  "mount": "${vault_auth_backend.cf.path}",
                  "name": "my-role",
                  "token_policies": [
                    "${vault_policy.cf_policy.name}"
                  ],
                  "token_ttl": 3600
                }
              references:
                mount: vault_auth_backend.cf.path
                token_policies: vault_policy.cf_policy.name
              dependencies:
                vault_auth_backend.cf: |-
                    {
                      "path": "cf",
                      "type": "cf"
                    }
                vault_policy.cf_policy: |-
                    {
                      "name": "cf-policy",
                      "policy": "path \"secret/*\" {\n  capabilities = [\"read\"]\n}\n"
                    }
        argumentDocs:
            alias_metadata: |-
                - (Optional) A map of metadata key/value pairs to attach to
                the token alias. Requires Vault 1.21+. On older Vault versions the CF auth
                plugin does not support this field and will silently ignore it.
            bound_application_ids: |-
                - (Optional) An optional set of CF application IDs. If
                set, a logging-in instance must belong to one of these applications.
            bound_instance_ids: |-
                - (Optional) An optional set of CF instance IDs. If set,
                the logging-in instance's ID must appear in this list.
            bound_organization_ids: |-
                - (Optional) An optional set of CF organization IDs.
                If set, a logging-in instance must belong to one of these organizations.
            bound_space_ids: |-
                - (Optional) An optional set of CF space IDs. If set, a
                logging-in instance must belong to one of these spaces.
            disable_ip_matching: |-
                - (Optional) If true, disables the default behavior
                that requires login requests to originate from an IP address listed in the
                instance certificate. Useful when CF instances sit behind a load balancer or
                NAT. Defaults to false. Removing this field from your configuration resets
                the value to false in Vault.
            mount: '- (Required) The mount path for the CF auth engine in Vault.'
            name: '- (Required) The name of the CF auth role.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            token_bound_cidrs: |-
                - (Optional) List of CIDR blocks; if set, specifies blocks
                of IP addresses which can authenticate successfully, and ties the resulting
                token to these blocks as well.
            token_explicit_max_ttl: |-
                - (Optional) If set, will encode an
                explicit max TTL
                onto the token in number of seconds. This is a hard cap even if token_ttl
                and token_max_ttl would otherwise allow a renewal.
            token_max_ttl: |-
                - (Optional) The maximum lifetime for generated tokens in
                number of seconds. Its current value will be referenced at renewal time.
            token_no_default_policy: |-
                - (Optional) If set, the default policy will not be
                set on generated tokens; otherwise it will be added to the policies set in
                token_policies.
            token_num_uses: |-
                - (Optional) The maximum number of times a generated token may
                be used (within its lifetime); 0 means unlimited.
            token_period: |-
                - (Optional) If set, indicates that the token generated using
                this role should never expire. The token should be renewed within the duration
                specified by this value. At each renewal, the token's TTL will be set to the
                value of this field. Specified in seconds.
            token_policies: |-
                - (Optional) List of policies to encode onto generated tokens.
                Depending on the auth method, this list may be supplemented by user/group/other
                values.
            token_ttl: |-
                - (Optional) The incremental lifetime for generated tokens in
                number of seconds. Its current value will be referenced at renewal time.
            token_type: |-
                - (Optional) The type of token that should be generated. Can be
                service, batch, or default to use the mount's tuned default (which unless
                changed will be service tokens).
        importStatements: []
    vault_config_ui_custom_message:
        subCategory: ""
        description: Manages a UI custom message in Vault.
        name: vault_config_ui_custom_message
        title: vault_config_ui_custom_message resource
        examples:
            - name: maintenance
              manifest: |-
                {
                  "authenticated": true,
                  "end_time": "2024-02-01T05:00:00.000Z",
                  "message_base64": "${base64encode(\"Vault will be offline for planned maintenance on February 1st, 2024 from 05:00Z to 08:00Z\")}",
                  "start_time": "2024-01-01T00:00:00.000Z",
                  "title": "Upcoming maintenance",
                  "type": "banner"
                }
        argumentDocs:
            authenticated: |-
                - (Optional) The value true if the custom message is displayed after logins are completed or false if they are
                displayed during the login in the Vault UI. The default value is true.
            end_time: '- (Optional) The time when the custom message expires. If this value is not specified, the custom message never expires.'
            href: '- (Required) The URL set in the hyperlink''s href attribute.'
            link: '- (Optional) A hyperlink to be included with the message. See below for more details.'
            message_base64: '- (Required) The base64-encoded content of the custom message.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            options: '- (Optional) A map of additional options that can be set on the custom message.'
            start_time: |-
                - (Required) The time when the custom message begins to be active. This value can be set to a future time, but cannot
                occur on or after the end_time value.
            title: '- (Required) The title of the custom message to create.'
            type: '- (Optional) The presentation type of the custom message. Must be one of the following values: banner or modal.'
        importStatements: []
    vault_consul_secret_backend:
        subCategory: ""
        description: Creates a Consul secret backend for Vault.
        name: vault_consul_secret_backend
        title: vault_consul_secret_backend resource
        examples:
            - name: test
              manifest: |-
                {
                  "address": "127.0.0.1:8500",
                  "description": "Manages the Consul backend",
                  "path": "consul",
                  "token": "4240861b-ce3d-8530-115a-521ff070dd29"
                }
            - name: test
              manifest: |-
                {
                  "address": "127.0.0.1:8500",
                  "bootstrap": true,
                  "description": "Bootstrap the Consul backend",
                  "path": "consul"
                }
            - name: test
              manifest: |-
                {
                  "address": "127.0.0.1:8500",
                  "ca_cert": "${file(\"ca.pem\")}",
                  "client_cert": "${file(\"client.pem\")}",
                  "client_key_wo": "${var.consul_client_key}",
                  "client_key_wo_version": 1,
                  "description": "Manages the Consul backend with write-only token",
                  "path": "consul",
                  "scheme": "https",
                  "token_wo": "${var.consul_token}",
                  "token_wo_version": 1
                }
              references:
                client_key_wo: var.consul_client_key
                token_wo: var.consul_token
        argumentDocs:
            address: '- (Required) Specifies the address of the Consul instance, provided as "host:port" like "127.0.0.1:8500".'
            allowed_managed_keys: '- (Optional) Set of managed key registry entry names that the mount in question is allowed to access'
            allowed_response_headers: |-
                - (Optional) List of headers to allow, allowing a plugin to include
                them in the response.
            audit_non_hmac_request_keys: '- (Optional) Specifies the list of keys that will not be HMAC''d by audit devices in the request data object.'
            audit_non_hmac_response_keys: '- (Optional) Specifies the list of keys that will not be HMAC''d by audit devices in the response data object.'
            bootstrap: '- (Optional) Denotes that the resource is used to bootstrap the Consul ACL system.'
            ca_cert: '- (Optional) CA certificate to use when verifying Consul server certificate, must be x509 PEM encoded.'
            client_cert: |-
                - (Optional) Client certificate used for Consul's TLS communication, must be x509 PEM encoded and if
                this is set you need to also set client_key.
            client_key: |-
                - (Optional) Client key used for Consul's TLS communication, must be x509 PEM encoded and if this is set
                you need to also set client_cert. Mutually exclusive with client_key_wo. Note: This field will be stored in
                Terraform state. Consider using client_key_wo instead for enhanced security.
            client_key_wo: |-
                - (Optional) Client key used for Consul's TLS communication, must be x509 PEM encoded, provided as a
                write-only field. This value will never be stored in Terraform state. Mutually exclusive with client_key. Must be
                used with client_key_wo_version.
            client_key_wo_version: |-
                - (Optional) Version counter for the write-only client key. Increment this value to trigger
                an update of the client key in Vault. Required when using client_key_wo.
            default_lease_ttl_seconds: '- (Optional) Default lease duration for tokens and secrets in seconds'
            delegated_auth_accessors: |-
                - (Optional)  List of allowed authentication mount accessors the
                backend can request delegated authentication for.
            description: '- (Optional) A human-friendly description for this backend.'
            disable_remount: |-
                - (Optional) If set, opts out of mount migration on path updates.
                See here for more info on Mount Migration
            external_entropy_access: '- (Optional) Boolean flag that can be explicitly set to true to enable the secrets engine to access Vault''s external entropy source'
            identity_token_key: |-
                - (Optional)  The key to use for signing plugin workload identity tokens. If
                not provided, this will default to Vault's OIDC default key. Requires Vault Enterprise 1.16+.
            listing_visibility: |-
                - (Optional) Specifies whether to show this mount in the UI-specific
                listing endpoint. Valid values are unauth or hidden. If not set, behaves like hidden.
            local: '- (Optional) Boolean flag that can be explicitly set to true to enforce local mount in HA environment'
            max_lease_ttl_seconds: '- (Optional) Maximum possible lease duration for tokens and secrets in seconds'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            options: '- (Optional) Specifies mount type specific options that are passed to the backend'
            passthrough_request_headers: |-
                - (Optional) List of headers to allow and pass from the request to
                the plugin.
            path: |-
                - (Optional) The unique location this backend should be mounted at. Must not begin or end with a /. Defaults
                to consul.
            plugin_version: |-
                - (Optional) Specifies the semantic version of the plugin to use, e.g. "v1.0.0".
                If unspecified, the server will select any matching unversioned plugin that may have been
                registered, the latest versioned plugin registered, or a built-in plugin in that order of precedence.
            scheme: '- (Optional) Specifies the URL scheme to use. Defaults to http.'
            seal_wrap: '- (Optional) Boolean flag that can be explicitly set to true to enable seal wrapping for the mount, causing values stored by the mount to be wrapped by the seal''s encryption capability'
            token: |-
                - (Optional) The Consul management token this backend should use to issue new tokens. This field is required
                when bootstrap is false. Mutually exclusive with token_wo. Note: This field will be stored in Terraform state.
                Consider using token_wo instead for enhanced security.
            token_wo: |-
                - (Optional) The Consul management token this backend should use to issue new tokens, provided as a
                write-only field. This value will never be stored in Terraform state. Mutually exclusive with token. Must be
                used with token_wo_version.
            token_wo_version: |-
                - (Optional) Version counter for the write-only token. Increment this value to trigger an update
                of the token in Vault. Required when using token_wo.
        importStatements: []
    vault_consul_secret_backend_role:
        subCategory: ""
