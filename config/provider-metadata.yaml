              manifest: |-
                {
                  "backend": "${vault_oci_auth_backend.oci.path}",
                  "name": "test-role",
                  "ocid_list": [
                    "ocid1.group.oc1..aaaaaaaabmyiinfq32y5aha3r2yo4exampleo4yg3fjk2sbne4567tropaa",
                    "ocid1.dynamicgroup.oc1..aaaaaaaabvfwct33xri5examplegov4zyjp3rd5d7sk9jjdggxijhco56hrq"
                  ],
                  "token_max_ttl": 120,
                  "token_policies": [
                    "default",
                    "dev",
                    "prod"
                  ],
                  "token_ttl": 60
                }
