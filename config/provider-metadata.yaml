    vault_pki_secret_backend_issuer:
        subCategory: ""
        description: Manages the lifecycle of an existing issuer on a PKI Secret Backend.
        name: vault_pki_secret_backend_issuer
        title: vault_pki_secret_backend_issuer resource
        examples:
            - name: example
              manifest: |-
                {
                  "backend": "${vault_pki_secret_backend_root_cert.root.backend}",
                  "issuer_name": "example-issuer",
                  "issuer_ref": "${vault_pki_secret_backend_root_cert.root.issuer_id}"
                }
              references:
                backend: vault_pki_secret_backend_root_cert.root.backend
                issuer_ref: vault_pki_secret_backend_root_cert.root.issuer_id
              dependencies:
                vault_mount.pki: |-
                    {
                      "default_lease_ttl_seconds": 3600,
                      "max_lease_ttl_seconds": 86400,
                      "path": "pki",
                      "type": "pki"
                    }
                vault_pki_secret_backend_root_cert.root: |-
                    {
                      "backend": "${vault_mount.pki.path}",
                      "common_name": "test",
                      "ttl": "86400",
                      "type": "internal"
                    }
        argumentDocs:
            backend: |-
                - (Required) The path the PKI secret backend is mounted at, with no
                leading or trailing /s.
            crl_distribution_points: |-
                - (Optional) Specifies the URL values for the CRL
                Distribution Points field.
            disable_critical_extension_checks: |-
                - (Optional) This determines whether this
                issuer is able to issue certificates where the chain of trust (including the
                issued certificate) contain critical extensions not processed by Vault.
            disable_name_checks: |-
                - (Optional) This determines whether this issuer is able
                to issue certificates where the chain of trust (including the final issued
                certificate) contains a link in which the subject of the issuing certificate
                does not match the named issuer of the certificate it signed.
            disable_name_constraint_checks: |-
                - (Optional) This determines whether this
                issuer is able to issue certificates where the chain of trust (including the
                final issued certificate) violates the name constraints critical extension of
                one of the issuer certificates in the chain.
            disable_path_length_checks: |-
                - (Optional) This determines whether this issuer
                is able to issue certificates where the chain of trust (including the final
                issued certificate) is longer than allowed by a certificate authority in that
                chain.
            enable_aia_url_templating: |-
                - (Optional) Specifies that the AIA URL values should
                be templated.
            issuer_id: '- ID of the issuer.'
            issuer_name: '- (Optional) Name of the issuer.'
            issuer_ref: '- (Required) Reference to an existing issuer.'
            issuing_certificates: |-
                - (Optional) Specifies the URL values for the Issuing
                Certificate field.
            leaf_not_after_behavior: |-
                - (Optional) Behavior of a leaf's NotAfter field during
                issuance.
            manual_chain: |-
                - (Optional) Chain of issuer references to build this issuer's
                computed CAChain field from, when non-empty.
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            ocsp_servers: '- (Optional) Specifies the URL values for the OCSP Servers field.'
            revocation_signature_algorithm: |-
                - (Optional) Which signature algorithm to use
                when building CRLs.
            usage: '- (Optional) Allowed usages for this issuer.'
        importStatements: []
