              references:
                key_name: vault_keymgmt_key.gcp_key.name
                kms_name: vault_keymgmt_gcp_kms.gcp.name
                mount: vault_mount.keymgmt.path
              dependencies:
                vault_keymgmt_gcp_kms.gcp: |-
                    {
                      "credentials_wo": {
                        "location": "us-central1",
                        "project": "my-project",
                        "service_account_file": "${file(\"gcp-credentials.json\")}"
                      },
                      "credentials_wo_version": 1,
                      "key_collection": "projects/my-project/locations/us-central1/keyRings/my-keyring",
                      "mount": "${vault_mount.keymgmt.path}",
                      "name": "gcp-kms"
                    }
                vault_keymgmt_key.gcp_key: |-
                    {
                      "mount": "${vault_mount.keymgmt.path}",
                      "name": "gcp-encryption-key",
                      "type": "aes256-gcm96"
                    }
        argumentDocs:
            key_name: '- (Required, Forces new resource) Specifies the name of the key to distribute to the given KMS provider.'
            kms_name: '- (Required, Forces new resource) Specifies the name of the KMS provider to distribute the given key to.'
            mount: |-
                - (Required, Forces new resource) Path of the Key Management secrets engine mount. Must match the
                path of a vault_mount resource with type = "keymgmt". Use
                vault_mount.keymgmt.path here.
            namespace: |-
                - (Optional) The namespace of the target resource.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured
                namespace.
                Available only for Vault Enterprise.
            protection: '- (Optional, Forces new resource) Specifies the protection of the key. The protection defines where cryptographic operations are performed with the key in the KMS provider. The following values are supported: hsm, software. Defaults to hsm.'
            purpose: '- (Required, Forces new resource) Specifies the purpose of the key. The purpose defines a set of cryptographic capabilities that the key will have in the KMS provider. A key must have at least one of the supported purposes. The following values are supported : encrypt, decrypt, sign, verify, wrap, unwrap.'
            versions: '- Map of distributed key versions to their identifiers in the KMS provider.'
        importStatements: []
    vault_keymgmt_gcp_kms:
