                    }
                vault_mount.keymgmt: |-
                    {
                      "path": "keymgmt",
                      "type": "keymgmt"
                    }
            - name: aws_dist
              manifest: |-
                {
                  "key_name": "${vault_keymgmt_key.encryption_key.name}",
                  "kms_name": "${vault_keymgmt_aws_kms.aws.name}",
                  "mount": "${vault_mount.keymgmt.path}",
                  "purpose": [
                    "encrypt",
                    "decrypt"
                  ]
                }
              references:
