                      "path": "keymgmt",
                      "type": "keymgmt"
                    }
            - name: production
              manifest: |-
                {
                  "key_collection": "projects/my-project/locations/us-central1/keyRings/my-keyring",
                  "mount": "${vault_mount.keymgmt.path}",
                  "name": "gcp-production"
                }
              references:
                mount: vault_mount.keymgmt.path
              dependencies:
                vault_mount.keymgmt: |-
                    {
                      "path": "keymgmt",
                      "type": "keymgmt"
                    }
        argumentDocs:
            credentials_wo: |-
                - (Optional, Write-only, Sensitive) The credentials to use for authentication with Google Cloud KMS. Supplying values for this parameter is optional, as credentials may also be specified through environment variables or Application Default Credentials. The order of precedence is environment variables, then the credentials provided to this parameter and Application Default Credentials. This value is write-only and will not be stored in Terraform state.
                The following values are supported:
            credentials_wo_version: '- (Optional) Version number for the write-only credentials. Increment this value to trigger a credential rotation. Changing this value will cause the credentials to be re-sent to Vault during the next apply. For more info see updating write-only attributes.'
            key_collection: '- (Required, Forces new resource) Refers to the resource ID of an existing GCP Cloud KMS key ring. Cannot be changed after creation.'
            mount: |-
                - (Required, Forces new resource) Path of the Key Management secrets engine mount. Must match the
                path of a vault_mount resource with type = "keymgmt". Use
                vault_mount.keymgmt.path here.
            name: '- (Required, Forces new resource) Specifies the name of the GCP Cloud KMS provider. Cannot be changed after creation.'
            namespace: |-
                - (Optional) The namespace of the target resource.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured
                namespace.
                Available only for Vault Enterprise.
            service_account_file: '- (Required) The path to a Google service account key file. The key file must be readable on the host that Vault server is running on. May also be provided by the GOOGLE_CREDENTIALS environment variable or by application default credentials.'
        importStatements: []
    vault_keymgmt_key:
        subCategory: ""
        description: Manages keys in the Vault Key Management secrets engine
        name: vault_keymgmt_key
        title: vault_keymgmt_key resource
        examples:
            - name: aes_key
              manifest: |-
                {
                  "mount": "${vault_mount.keymgmt.path}",
                  "name": "aes-encryption-key",
                  "type": "aes256-gcm96"
                }
              references:
                mount: vault_mount.keymgmt.path
              dependencies:
                vault_mount.keymgmt: |-
                    {
                      "path": "keymgmt",
                      "type": "keymgmt"
                    }
            - name: default_key
              manifest: |-
                {
                  "mount": "${vault_mount.keymgmt.path}",
                  "name": "my-key"
                }
              references:
                mount: vault_mount.keymgmt.path
            - name: rsa_key
              manifest: |-
                {
                  "deletion_allowed": false,
                  "mount": "${vault_mount.keymgmt.path}",
                  "name": "rsa-signing-key"
                }
              references:
                mount: vault_mount.keymgmt.path
            - name: versioned_key
              manifest: |-
                {
                  "min_enabled_version": 2,
                  "mount": "${vault_mount.keymgmt.path}",
                  "name": "versioned-key",
                  "type": "aes256-gcm96"
                }
              references:
                mount: vault_mount.keymgmt.path
            - name: replicated_key
              manifest: |-
                {
                  "mount": "${vault_mount.keymgmt.path}",
                  "name": "multi-region-key",
                  "replica_regions": [
                    "us-west-1",
                    "us-east-1",
                    "eu-west-1"
                  ],
                  "type": "aes256-gcm96"
                }
              references:
                mount: vault_mount.keymgmt.path
        argumentDocs:
            aes256-gcm96: '- AES-GCM with a 256-bit AES key and a 96-bit nonce (symmetric)'
            deletion_allowed: '- (Optional) Specifies if the key is allowed to be deleted.'
            ecdsa-p256: '- ECDSA using the P-256 elliptic curve (asymmetric)'
            ecdsa-p384: '-  ECDSA using the P-384 elliptic curve (asymmetric)'
            ecdsa-p521: '- ECDSA using the P-521 elliptic curve (asymmetric)'
            latest_version: '- Specifies the latest version of the key.'
            min_enabled_version: |-
                - (Optional) Specifies the minimum enabled version of the key. All versions of the key
                less than the specified version will be disabled for cryptographic operations in the KMS provider that the key
                has been distributed to. Setting this value to 0 means that all versions will be enabled.
            mount: |-
                - (Required, Forces new resource) Path of the Key Management secrets engine mount. Must match the
                path of a vault_mount resource with type = "keymgmt". Use
                vault_mount.keymgmt.path here.
            name: '- (Required, Forces new resource) Specifies the name of the key to create.'
            namespace: |-
                - (Optional) The namespace of the target resource.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured
                namespace.
                Available only for Vault Enterprise.
            replica_regions: '- (Optional, Forces new resource) Specifies the regions in which the key should be replicated. Supported only for AWS KMS.'
            rsa-2048: '- RSA with bit size of 2048 (asymmetric) (default)'
            rsa-3072: '- RSA with bit size of 3072 (asymmetric)'
            rsa-4096: '- RSA with bit size of 4096 (asymmetric)'
            type: |-
                - (Optional, Forces new resource) Specifies the type of cryptographic key to create. Defaults to rsa-2048.
                The following key types are supported:
        importStatements: []
    vault_keymgmt_key_rotate:
        subCategory: ""
        description: Rotates keys in the Vault Key Management secrets engine
        name: vault_keymgmt_key_rotate
        title: vault_keymgmt_key_rotate resource
        examples:
            - name: rotate
              manifest: |-
                {
                  "mount": "${vault_mount.keymgmt.path}",
                  "name": "${vault_keymgmt_key.encryption_key.name}"
                }
              references:
                mount: vault_mount.keymgmt.path
                name: vault_keymgmt_key.encryption_key.name
              dependencies:
                vault_keymgmt_key.encryption_key: |-
                    {
                      "mount": "${vault_mount.keymgmt.path}",
                      "name": "rotation-example",
                      "type": "aes256-gcm96"
                    }
                vault_mount.keymgmt: |-
                    {
                      "path": "keymgmt",
                      "type": "keymgmt"
                    }
        argumentDocs:
            latest_version: '- Specifies the latest version of the key.'
            mount: |-
                - (Required, Forces new resource) Path of the Key Management secrets engine mount. Must match the
                path of a vault_mount resource with type = "keymgmt". Use
                vault_mount.keymgmt.path here.
            name: '- (Required, Forces new resource) Specifies the name of the key to rotate.'
            namespace: |-
                - (Optional) The namespace of the target resource.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured
                namespace.
                Available only for Vault Enterprise.
        importStatements: []
    vault_keymgmt_replicate_key:
        subCategory: ""
        description: Replicates keys across regions in AWS KMS (AWS KMS only)
        name: vault_keymgmt_replicate_key
        title: vault_keymgmt_replicate_key resource
        examples:
            - name: replicate
              manifest: |-
                {
                  "depends_on": [
                    "${vault_keymgmt_distribute_key.dist}"
                  ],
                  "key_name": "${vault_keymgmt_key.key.name}",
                  "kms_name": "${vault_keymgmt_aws_kms.aws.name}",
                  "mount": "${vault_mount.keymgmt.path}"
                }
              references:
                key_name: vault_keymgmt_key.key.name
                kms_name: vault_keymgmt_aws_kms.aws.name
                mount: vault_mount.keymgmt.path
              dependencies:
                vault_keymgmt_aws_kms.aws: |-
                    {
                      "credentials_wo": {
                        "access_key": "${var.aws_access_key_id}",
                        "secret_key": "${var.aws_secret_access_key}"
                      },
                      "credentials_wo_version": 1,
                      "key_collection": "us-west-2",
                      "mount": "${vault_mount.keymgmt.path}",
                      "name": "aws-kms"
                    }
                vault_keymgmt_distribute_key.dist: |-
                    {
                      "key_name": "${vault_keymgmt_key.key.name}",
                      "kms_name": "${vault_keymgmt_aws_kms.aws.name}",
                      "mount": "${vault_mount.keymgmt.path}",
                      "purpose": [
                        "encrypt",
                        "decrypt"
                      ]
                    }
                vault_keymgmt_key.key: |-
                    {
                      "mount": "${vault_mount.keymgmt.path}",
                      "name": "multi-region-key",
                      "replica_regions": [
                        "us-east-1",
                        "eu-west-1"
                      ],
                      "type": "aes256-gcm96"
                    }
                vault_mount.keymgmt: |-
                    {
                      "path": "keymgmt",
                      "type": "keymgmt"
                    }
        argumentDocs:
            key_name: '- (Required, Forces new resource) Specifies the name of the key to replicate. The key must have replica_regions configured and must already be distributed to the AWS KMS provider.'
            kms_name: '- (Required, Forces new resource) Specifies the name of the AWS KMS provider.'
            mount: |-
                - (Required, Forces new resource) Path of the Key Management secrets engine mount. Must match the
                path of a vault_mount resource with type = "keymgmt". Use
                vault_mount.keymgmt.path here.
            namespace: |-
                - (Optional) The namespace of the target resource.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured
                namespace.
                Available only for Vault Enterprise.
        importStatements: []
    vault_kmip_secret_backend:
        subCategory: ""
        description: Provision KMIP Secret backends in Vault.
        name: vault_kmip_secret_backend
        title: vault_kmip_secret_backend resource
        examples:
            - name: default
              manifest: |-
                {
                  "default_tls_client_key_bits": 4096,
                  "default_tls_client_key_type": "rsa",
                  "default_tls_client_ttl": 86400,
                  "description": "Vault KMIP backend",
                  "listen_addrs": [
                    "127.0.0.1:5696",
                    "127.0.0.1:8080"
                  ],
                  "path": "kmip",
                  "tls_ca_key_bits": 4096,
                  "tls_ca_key_type": "rsa"
                }
        argumentDocs:
            allowed_managed_keys: '- (Optional) Set of managed key registry entry names that the mount in question is allowed to access'
            allowed_response_headers: |-
                - (Optional) List of headers to allow, allowing a plugin to include
                them in the response.
            audit_non_hmac_request_keys: '- (Optional) Specifies the list of keys that will not be HMAC''d by audit devices in the request data object.'
            audit_non_hmac_response_keys: '- (Optional) Specifies the list of keys that will not be HMAC''d by audit devices in the response data object.'
            default_lease_ttl_seconds: '- (Optional) Default lease duration for tokens and secrets in seconds'
            default_tls_client_key_bits: '- (Optional) Client certificate key bits, valid values depend on key type.'
            default_tls_client_key_type: '- (Optional) Client certificate key type, rsa or ec.'
            delegated_auth_accessors: |-
                - (Optional)  List of allowed authentication mount accessors the
                backend can request delegated authentication for.
            description: '- (Optional) Human-friendly description of the mount'
            disable_remount: |-
                - (Optional) If set, opts out of mount migration on path updates.
                See here for more info on Mount Migration
            external_entropy_access: '- (Optional) Boolean flag that can be explicitly set to true to enable the secrets engine to access Vault''s external entropy source'
            identity_token_key: |-
                - (Optional)  The key to use for signing plugin workload identity tokens. If
                not provided, this will default to Vault's OIDC default key. Requires Vault Enterprise 1.16+.
            listen_addrs: '- (Optional) Addresses the KMIP server should listen on (host:port).'
            listing_visibility: |-
                - (Optional) Specifies whether to show this mount in the UI-specific
                listing endpoint. Valid values are unauth or hidden. If not set, behaves like hidden.
            local: '- (Optional) Boolean flag that can be explicitly set to true to enforce local mount in HA environment'
            max_lease_ttl_seconds: '- (Optional) Maximum possible lease duration for tokens and secrets in seconds'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            options: '- (Optional) Specifies mount type specific options that are passed to the backend'
            passthrough_request_headers: |-
                - (Optional) List of headers to allow and pass from the request to
                the plugin.
            path: |-
                - (Required) The unique path this backend should be mounted at. Must
                not begin or end with a /. Defaults to kmip.
            plugin_version: |-
                - (Optional) Specifies the semantic version of the plugin to use, e.g. "v1.0.0".
                If unspecified, the server will select any matching unversioned plugin that may have been
                registered, the latest versioned plugin registered, or a built-in plugin in that order of precedence.
            seal_wrap: '- (Optional) Boolean flag that can be explicitly set to true to enable seal wrapping for the mount, causing values stored by the mount to be wrapped by the seal''s encryption capability'
            server_hostnames: '- (Optional) Hostnames to include in the server''s TLS certificate as SAN DNS names. The first will be used as the common name (CN).'
            server_ips: '- (Optional) IPs to include in the server''s TLS certificate as SAN IP addresses.'
            tls_ca_key_bits: '- (Optional) CA key bits, valid values depend on key type.'
            tls_ca_key_type: '- (Optional) CA key type, rsa or ec.'
            tls_min_version: '- (Optional) Minimum TLS version to accept.'
        importStatements: []
    vault_kmip_secret_ca_generated:
        subCategory: ""
        description: Manage generated KMIP Secret CAs in Vault.
        name: vault_kmip_secret_ca_generated
        title: vault_kmip_secret_ca_generated resource
        examples:
            - name: ec
              manifest: |-
                {
                  "key_bits": 256,
                  "key_type": "ec",
                  "name": "my-ec-ca",
                  "path": "${vault_kmip_secret_backend.default.path}",
                  "ttl": 31536000
                }
              references:
                path: vault_kmip_secret_backend.default.path
              dependencies:
                vault_kmip_secret_backend.default: |-
                    {
                      "description": "Vault KMIP backend",
                      "path": "kmip"
                    }
            - name: rsa
              manifest: |-
                {
                  "key_bits": 2048,
                  "key_type": "rsa",
                  "name": "my-rsa-ca",
                  "path": "${vault_kmip_secret_backend.default.path}"
                }
              references:
                path: vault_kmip_secret_backend.default.path
              dependencies:
                vault_kmip_secret_backend.default: |-
                    {
                      "description": "Vault KMIP backend",
                      "path": "kmip"
                    }
            - name: custom_ttl
              manifest: |-
                {
                  "key_bits": 384,
                  "key_type": "ec",
                  "name": "long-lived-ca",
                  "path": "${vault_kmip_secret_backend.default.path}",
                  "ttl": 63072000
                }
              references:
                path: vault_kmip_secret_backend.default.path
              dependencies:
                vault_kmip_secret_backend.default: |-
                    {
                      "description": "Vault KMIP backend",
                      "path": "kmip"
                    }
        argumentDocs:
            ca_pem: '- The generated CA certificate in PEM format.'
            ec: ': 224, 256, 384, 521'
            id: '- The ID of the CA in the format <path>/ca/<name>.'
            key_bits: '- (Required) CA key bits. Valid values depend on key_type:'
            key_type: '- (Required) CA key type. Valid values are rsa or ec.'
            name: '- (Required) Name to identify the CA. This will be used in the CA''s path.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
            path: '- (Required) Path where KMIP backend is mounted. Must not begin or end with a /.'
            rsa: ': 2048, 3072, 4096'
            ttl: '- (Optional) CA TTL in seconds. Defaults to 365 days (31536000 seconds).'
        importStatements: []
    vault_kmip_secret_ca_imported:
        subCategory: ""
        description: Manage imported KMIP Secret CAs in Vault.
        name: vault_kmip_secret_ca_imported
        title: vault_kmip_secret_ca_imported resource
        examples:
            - name: named
              manifest: |-
                {
                  "ca_pem": "${file(\"path/to/ca-certificate.pem\")}",
                  "name": "imported-ca",
                  "path": "${vault_kmip_secret_backend.default.path}",
                  "role_name": "admin",
                  "scope_name": "production"
                }
              references:
                path: vault_kmip_secret_backend.default.path
              dependencies:
                vault_kmip_secret_backend.default: |-
                    {
                      "description": "Vault KMIP backend",
                      "path": "kmip"
                    }
            - name: field_based
              manifest: |-
                {
                  "ca_pem": "${file(\"path/to/ca-certificate.pem\")}",
                  "name": "imported-ca-fields",
                  "path": "${vault_kmip_secret_backend.default.path}",
                  "role_field": "OU",
                  "scope_field": "O"
                }
              references:
                path: vault_kmip_secret_backend.default.path
              dependencies:
                vault_kmip_secret_backend.default: |-
                    {
                      "description": "Vault KMIP backend",
                      "path": "kmip"
                    }
            - name: mixed
              manifest: |-
                {
                  "ca_pem": "${file(\"path/to/ca-certificate.pem\")}",
                  "name": "imported-ca-mixed",
                  "path": "${vault_kmip_secret_backend.default.path}",
                  "role_field": "CN",
                  "scope_name": "production"
                }
              references:
                path: vault_kmip_secret_backend.default.path
              dependencies:
                vault_kmip_secret_backend.default: |-
                    {
                      "description": "Vault KMIP backend",
                      "path": "kmip"
                    }
        argumentDocs:
            ca_pem: '- (Required) CA certificate in PEM format.'
            id: '- The ID of the CA in the format <path>/ca/<name>.'
            name: '- (Required) Name to identify the CA. This will be used in the CA''s path.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
            path: '- (Required) Path where KMIP backend is mounted. Must not begin or end with a /.'
            role_field: '- (Optional) The field in the certificate to use for the role. Valid values are CN, O, OU, or UID. Must specify exactly one of role_name or role_field.'
            role_name: '- (Optional) The role name to associate with this CA. Must specify exactly one of role_name or role_field.'
            scope_field: '- (Optional) The field in the certificate to use for the scope. Valid values are CN, O, OU, or UID. Must specify exactly one of scope_name or scope_field.'
            scope_name: '- (Optional) The scope name to associate with this CA. Must specify exactly one of scope_name or scope_field.'
        importStatements: []
    vault_kmip_secret_listener:
        subCategory: ""
        description: Manage KMIP Secret listeners in Vault.
        name: vault_kmip_secret_listener
        title: vault_kmip_secret_listener resource
        examples:
            - name: example
              manifest: |-
                {
                  "address": "0.0.0.0:5696",
                  "ca": "${vault_kmip_secret_ca.example.name}",
                  "name": "example-listener",
                  "path": "${vault_kmip_secret_backend.default.path}",
                  "server_hostnames": [
                    "kmip.example.com"
                  ]
                }
              references:
                ca: vault_kmip_secret_ca.example.name
                path: vault_kmip_secret_backend.default.path
              dependencies:
                vault_kmip_secret_backend.default: |-
                    {
                      "description": "Vault KMIP backend",
                      "path": "kmip"
                    }
                vault_kmip_secret_ca.example: |-
                    {
                      "key_bits": 256,
                      "key_type": "ec",
                      "name": "example-ca",
                      "path": "${vault_kmip_secret_backend.default.path}"
                    }
            - name: advanced
              manifest: |-
                {
                  "additional_client_cas": [
                    "${vault_kmip_secret_ca.secondary.name}"
                  ],
                  "address": "0.0.0.0:5696",
                  "also_use_legacy_ca": true,
                  "ca": "${vault_kmip_secret_ca.primary.name}",
                  "name": "advanced-listener",
                  "path": "${vault_kmip_secret_backend.default.path}",
                  "server_hostnames": [
                    "kmip.example.com",
                    "kmip-backup.example.com"
                  ],
                  "server_ips": [
                    "192.168.1.100",
                    "10.0.0.50"
                  ],
                  "tls_cipher_suites": "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384",
                  "tls_min_version": "tls13"
                }
              references:
                additional_client_cas: vault_kmip_secret_ca.secondary.name
                ca: vault_kmip_secret_ca.primary.name
                path: vault_kmip_secret_backend.default.path
              dependencies:
                vault_kmip_secret_backend.default: |-
                    {
                      "description": "Vault KMIP backend",
                      "path": "kmip"
                    }
                vault_kmip_secret_ca.primary: |-
                    {
                      "key_bits": 4096,
                      "key_type": "rsa",
                      "name": "primary-ca",
                      "path": "${vault_kmip_secret_backend.default.path}"
                    }
                vault_kmip_secret_ca.secondary: |-
                    {
                      "key_bits": 256,
                      "key_type": "ec",
                      "name": "secondary-ca",
                      "path": "${vault_kmip_secret_backend.default.path}"
                    }
        argumentDocs:
            additional_client_cas: '- (Optional) Names of additional TLS CAs to use to verify client certificates. This allows accepting client certificates from multiple CAs.'
            address: '- (Required) Host:port address to listen on (e.g., 0.0.0.0:5696 or 127.0.0.1:8080).'
            also_use_legacy_ca: '- (Optional) Use the legacy unnamed CA for verifying client certificates as well. Defaults to false.'
            ca: '- (Required) Name of the CA to use to generate the server certificate and verify client certificates.'
            id: '- The ID of the listener in the format <path>/listener/<name>.'
            name: '- (Required) Unique name for the listener.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            path: '- (Required) Path where KMIP backend is mounted. Must not begin or end with a /.'
            server_hostnames: '- (Optional) DNS SANs to include in the listener''s server certificate. These hostnames will be added as Subject Alternative Names in the certificate.'
            server_ips: '- (Optional) IP SANs to include in the listener''s server certificate. These IPs will be added as Subject Alternative Names in the certificate.'
            tls_cipher_suites: '- (Optional) Comma-separated list of TLS cipher suites to allow. This setting does not apply to TLS 1.3 and later. Example: TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384.'
            tls_max_version: '- (Optional) Maximum TLS version to accept. Valid values are tls12 or tls13.'
            tls_min_version: '- (Optional) Minimum TLS version to accept. Valid values are tls12 or tls13.'
            vault_kmip_secret_ca: .
        importStatements: []
    vault_kmip_secret_role:
        subCategory: ""
        description: Provision KMIP Secret roles in Vault.
        name: vault_kmip_secret_role
        title: vault_kmip_secret_role resource
        examples:
            - name: admin
              manifest: |-
                {
                  "operation_activate": true,
                  "operation_create": true,
                  "operation_destroy": true,
                  "operation_get": true,
                  "operation_get_attributes": true,
                  "path": "${vault_kmip_secret_scope.dev.path}",
                  "role": "admin",
                  "scope": "${vault_kmip_secret_scope.dev.scope}",
                  "tls_client_key_bits": 256,
                  "tls_client_key_type": "ec"
                }
              references:
                path: vault_kmip_secret_scope.dev.path
                scope: vault_kmip_secret_scope.dev.scope
              dependencies:
                vault_kmip_secret_backend.default: |-
                    {
                      "description": "Vault KMIP backend",
                      "path": "kmip"
                    }
                vault_kmip_secret_scope.dev: |-
                    {
                      "force": true,
                      "path": "${vault_kmip_secret_backend.default.path}",
                      "scope": "dev"
                    }
        argumentDocs:
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            operation_activate: '- (Optional) Grant permission to use the KMIP Activate operation.'
            operation_add_attribute: '- (Optional) Grant permission to use the KMIP Add Attribute operation.'
            operation_all: '- (Optional) Grant all permissions to this role. May not be specified with any other operation_* params.'
            operation_create: '- (Optional) Grant permission to use the KMIP Create operation.'
            operation_create_key_pair: '- (Optional) Grant permission to use the KMIP Create Key Pair operation.'
            operation_decrypt: '- (Optional) Grant permission to use the KMIP Decrypt operation.'
            operation_delete_attribute: '- (Optional) Grant permission to use the KMIP Delete Attribute operation.'
            operation_destroy: '- (Optional) Grant permission to use the KMIP Destroy operation.'
            operation_discover_versions: '- (Optional) Grant permission to use the KMIP Discover Version operation.'
            operation_encrypt: '- (Optional) Grant permission to use the KMIP Encrypt operation.'
            operation_get: '- (Optional) Grant permission to use the KMIP Get operation.'
            operation_get_attribute_list: '- (Optional) Grant permission to use the KMIP Get Atrribute List operation.'
            operation_get_attributes: '- (Optional) Grant permission to use the KMIP Get Atrributes operation.'
            operation_import: '- (Optional) Grant permission to use the KMIP Import operation.'
            operation_locate: '- (Optional) Grant permission to use the KMIP Get Locate operation.'
            operation_mac: '- (Optional) Grant permission to use the KMIP MAC operation.'
            operation_mac_verify: '- (Optional) Grant permission to use the KMIP MAC Verify operation.'
            operation_modify_attribute: '- (Optional) Grant permission to use the KMIP Modify Attribute operation.'
            operation_none: '- (Optional) Remove all permissions from this role. May not be specified with any other operation_* params.'
            operation_query: '- (Optional) Grant permission to use the KMIP Query operation.'
            operation_register: '- (Optional) Grant permission to use the KMIP Register operation.'
            operation_rekey: '- (Optional) Grant permission to use the KMIP Rekey operation.'
            operation_rekey_key_pair: '- (Optional) Grant permission to use the KMIP Rekey Key Pair operation.'
            operation_revoke: '- (Optional) Grant permission to use the KMIP Revoke operation.'
            operation_rng_retrieve: '- (Optional) Grant permission to use the KMIP RNG Retrieve operation.'
            operation_rng_seed: '- (Optional) Grant permission to use the KMIP RNG Seed operation.'
            operation_sign: '- (Optional) Grant permission to use the KMIP Sign operation.'
            operation_signature_verify: '- (Optional) Grant permission to use the KMIP Signature Verify operation.'
            path: |-
                - (Required) The unique path this backend should be mounted at. Must
                not begin or end with a /. Defaults to kmip.
            role: '- (Required) Name of the role.'
            scope: '- (Required) Name of the scope.'
            tls_client_key_bits: '- (Optional) Client certificate key bits, valid values depend on key type.'
            tls_client_key_type: '- (Optional) Client certificate key type, rsa or ec.'
            tls_client_ttl: '- (Optional) Client certificate TTL in seconds.'
        importStatements: []
    vault_kmip_secret_scope:
        subCategory: ""
        description: Provision KMIP Secret scopes in Vault.
        name: vault_kmip_secret_scope
        title: vault_kmip_secret_scope resource
        examples:
            - name: dev
              manifest: |-
                {
                  "force": true,
                  "path": "${vault_kmip_secret_backend.default.path}",
                  "scope": "dev"
                }
              references:
                path: vault_kmip_secret_backend.default.path
              dependencies:
                vault_kmip_secret_backend.default: |-
                    {
                      "description": "Vault KMIP backend",
                      "path": "kmip"
                    }
        argumentDocs:
            force: '- (Optional) Boolean field to force deletion even if there are managed objects in the scope.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            path: |-
                - (Required) The unique path this backend should be mounted at. Must
                not begin or end with a /. Defaults to kmip.
            scope: '- (Required) Name of the scope.'
        importStatements: []
    vault_kubernetes_auth_backend_config:
        subCategory: ""
        description: Manages Kubernetes auth backend configs in Vault.
        name: vault_kubernetes_auth_backend_config
        title: vault_kubernetes_auth_backend_config resource
        examples:
            - name: example
              manifest: |-
                {
                  "backend": "${vault_auth_backend.kubernetes.path}",
                  "disable_iss_validation": true,
                  "issuer": "api",
                  "kubernetes_ca_cert": "-----BEGIN CERTIFICATE-----\nexample\n-----END CERTIFICATE-----",
                  "kubernetes_host": "http://example.com:443",
                  "token_reviewer_jwt": "ZXhhbXBsZQo="
                }
              references:
                backend: vault_auth_backend.kubernetes.path
              dependencies:
                vault_auth_backend.kubernetes: |-
                    {
                      "type": "kubernetes"
                    }
            - name: example
              manifest: |-
                {
                  "backend": "${vault_auth_backend.kubernetes.path}",
                  "disable_iss_validation": true,
                  "issuer": "api",
                  "kubernetes_ca_cert": "-----BEGIN CERTIFICATE-----\nexample\n-----END CERTIFICATE-----",
                  "kubernetes_host": "http://example.com:443",
                  "token_reviewer_jwt_wo": "${var.k8s_token_reviewer_jwt}",
                  "token_reviewer_jwt_wo_version": 1
                }
              references:
                backend: vault_auth_backend.kubernetes.path
                token_reviewer_jwt_wo: var.k8s_token_reviewer_jwt
              dependencies:
                vault_auth_backend.kubernetes: |-
                    {
                      "type": "kubernetes"
                    }
        argumentDocs:
            disable_iss_validation: '- (Optional) Disable JWT issuer validation. Allows to skip ISS validation. Requires Vault v1.5.4+ or Vault auth kubernetes plugin v0.7.1+'
            disable_local_ca_jwt: '- (Optional) Disable defaulting to the local CA cert and service account JWT when running in a Kubernetes pod. Requires Vault v1.5.4+ or Vault auth kubernetes plugin v0.7.1+'
            issuer: '- (Optional) JWT issuer. If no issuer is specified, kubernetes.io/serviceaccount will be used as the default issuer.'
            kubernetes_ca_cert: '- (Optional) PEM encoded CA cert for use by the TLS client used to talk with the Kubernetes API.'
            kubernetes_host: '- (Required) Host must be a host string, a host:port pair, or a URL to the base of the Kubernetes API server.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            pem_keys: '- (Optional) List of PEM-formatted public keys or certificates used to verify the signatures of Kubernetes service account JWTs. If a certificate is given, its public key will be extracted. Not every installation of Kubernetes exposes these keys.'
            token_reviewer_jwt: '- (Optional) A service account JWT (or other token) used as a bearer token to access the TokenReview API to validate other JWTs during login. If not set the JWT used for login will be used to access the API. Conflicts with token_reviewer_jwt_wo.'
            token_reviewer_jwt_wo: |-
                - (Optional) A write-only service account JWT (or other token) used as a bearer token to access the
                TokenReview API to validate other JWTs during login. If not set the JWT used for login will be used to access the API.
                Conflicts with token_reviewer_jwt.
                Note: This property is write-only and will not be read from the API.
            token_reviewer_jwt_wo_version: '- (Optional) The version of token_reviewer_jwt_wo to use during write operations. Required with token_reviewer_jwt_wo. For more info see updating write-only attributes.'
            use_annotations_as_alias_metadata: '- (Optional) Use annotations from the client token''s associated service account as alias metadata for the Vault entity. Requires Vault v1.16+ or Vault auth kubernetes plugin v0.18.0+'
        importStatements: []
    vault_kubernetes_auth_backend_role:
        subCategory: ""
        description: Manages Kubernetes auth backend roles in Vault.
        name: vault_kubernetes_auth_backend_role
        title: vault_kubernetes_auth_backend_role resource
        examples:
            - name: example
              manifest: |-
                {
                  "audience": "vault",
                  "backend": "${vault_auth_backend.kubernetes.path}",
                  "bound_service_account_names": [
                    "example"
                  ],
                  "bound_service_account_namespaces": [
                    "example"
                  ],
                  "role_name": "example-role",
                  "token_policies": [
                    "default",
                    "dev",
                    "prod"
                  ],
                  "token_ttl": 3600
                }
              references:
                backend: vault_auth_backend.kubernetes.path
              dependencies:
                vault_auth_backend.kubernetes: |-
                    {
                      "type": "kubernetes"
                    }
        argumentDocs:
            alias_name_source: |-
                - (Optional, default: serviceaccount_uid) Configures how identity aliases are generated.
                Valid choices are: serviceaccount_uid, serviceaccount_name. (vault-1.9+)
            audience: '- (Optional) Audience claim to verify in the JWT.'
            backend: '- (Optional) Unique name of the kubernetes backend to configure.'
            bound_service_account_names: '- (Required) List of service account names able to access this role. If set to ["*"] all names are allowed, both this and bound_service_account_namespaces can not be "*".'
            bound_service_account_namespace_selector: '- (Optional) A label selector for Kubernetes namespaces allowed to access this role. Accepts either a JSON or YAML object. The value should be of type LabelSelector. Currently, label selectors with matchExpressions are not supported. To use label selectors, Vault must have permission to read namespaces on the Kubernetes cluster. If set with bound_service_account_namespaces, the conditions are ORed. Requires Vault v1.16+.'
            bound_service_account_namespaces: '- (Optional) List of namespaces allowed to access this role. If set to ["*"] all namespaces are allowed, both this and bound_service_account_names can not be set to "*".'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            role_name: '- (Required) Name of the role.'
            token_bound_cidrs: |-
                - (Optional) List of CIDR blocks; if set, specifies blocks of IP
                addresses which can authenticate successfully, and ties the resulting token to these blocks
                as well.
            token_explicit_max_ttl: |-
                - (Optional) If set, will encode an
                explicit max TTL
                onto the token in number of seconds. This is a hard cap even if token_ttl and
                token_max_ttl would otherwise allow a renewal.
            token_max_ttl: |-
                - (Optional) The maximum lifetime for generated tokens in number of seconds.
                Its current value will be referenced at renewal time.
            token_no_default_policy: |-
                - (Optional) If set, the default policy will not be set on
                generated tokens; otherwise it will be added to the policies set in token_policies.
            token_num_uses: |-
                - (Optional) The maximum number
                of times a generated token may be used (within its lifetime); 0 means unlimited.
            token_period: |-
                - (Optional) If set, indicates that the
                token generated using this role should never expire. The token should be renewed within the
                duration specified by this value. At each renewal, the token's TTL will be set to the
                value of this field. Specified in seconds.
            token_policies: |-
                - (Optional) List of policies to encode onto generated tokens. Depending
                on the auth method, this list may be supplemented by user/group/other values.
            token_type: |-
                - (Optional) The type of token that should be generated. Can be service,
                batch, or default to use the mount's tuned default (which unless changed will be
                service tokens). For token store roles, there are two additional possibilities:
                default-service and default-batch which specify the type to return unless the client
                requests a different type at generation time.
        importStatements: []
    vault_kubernetes_secret_backend:
        subCategory: ""
        description: Creates a Kubernetes Secrets Engine in Vault.
        name: vault_kubernetes_secret_backend
        title: vault_kubernetes_secret_backend resource
        examples:
            - name: config
              manifest: |-
                {
                  "default_lease_ttl_seconds": 43200,
                  "description": "kubernetes secrets engine description",
                  "disable_local_ca_jwt": false,
                  "kubernetes_ca_cert": "${file(\"/path/to/cert\")}",
                  "kubernetes_host": "https://127.0.0.1:61233",
                  "max_lease_ttl_seconds": 86400,
                  "path": "kubernetes",
                  "service_account_jwt_wo": "${file(\"/path/to/token\")}",
                  "service_account_jwt_wo_version": 1
                }
        argumentDocs:
            allowed_managed_keys: '- (Optional) Set of managed key registry entry names that the mount in question is allowed to access'
            allowed_response_headers: |-
                - (Optional) List of headers to allow, allowing a plugin to include
                them in the response.
            audit_non_hmac_request_keys: '- (Optional) Specifies the list of keys that will not be HMAC''d by audit devices in the request data object.'
            audit_non_hmac_response_keys: '- (Optional) Specifies the list of keys that will not be HMAC''d by audit devices in the response data object.'
            default_lease_ttl_seconds: '- (Optional) Default lease duration for tokens and secrets in seconds'
            delegated_auth_accessors: |-
                - (Optional)  List of allowed authentication mount accessors the
                backend can request delegated authentication for.
            description: '- (Optional) Human-friendly description of the mount'
            disable_local_ca_jwt: |-
                - (Optional) Disable defaulting to the local CA certificate and
                service account JWT when Vault is running in a Kubernetes pod.
            external_entropy_access: '- (Optional) Boolean flag that can be explicitly set to true to enable the secrets engine to access Vault''s external entropy source'
            identity_token_key: |-
                - (Optional)  The key to use for signing plugin workload identity tokens. If
                not provided, this will default to Vault's OIDC default key. Requires Vault Enterprise 1.16+.
            kubernetes_ca_cert: |-
                - (Optional) A PEM-encoded CA certificate used by the
                secrets engine to verify the Kubernetes API server certificate. Defaults to the local
                pod’s CA if Vault is running in Kubernetes. Otherwise, defaults to the root CA set where
                Vault is running.
            kubernetes_host: |-
                - (Optional) The Kubernetes API URL to connect to. Required if the
                standard pod environment variables KUBERNETES_SERVICE_HOST or KUBERNETES_SERVICE_PORT
                are not set on the host that Vault is running on.
            listing_visibility: |-
                - (Optional) Specifies whether to show this mount in the UI-specific
                listing endpoint. Valid values are unauth or hidden. If not set, behaves like hidden.
            local: '- (Optional) Boolean flag that can be explicitly set to true to enforce local mount in HA environment'
            max_lease_ttl_seconds: '- (Optional) Maximum possible lease duration for tokens and secrets in seconds'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            options: '- (Optional) Specifies mount type specific options that are passed to the backend'
            passthrough_request_headers: |-
                - (Optional) List of headers to allow and pass from the request to
                the plugin.
            plugin_version: |-
                - (Optional) Specifies the semantic version of the plugin to use, e.g. "v1.0.0".
                If unspecified, the server will select any matching unversioned plugin that may have been
                registered, the latest versioned plugin registered, or a built-in plugin in that order of precedence.
            seal_wrap: '- (Optional) Boolean flag that can be explicitly set to true to enable seal wrapping for the mount, causing values stored by the mount to be wrapped by the seal''s encryption capability'
            service_account_jwt: |-
                - (Optional) The JSON web token of the service account used by the
                secrets engine to manage Kubernetes credentials. Defaults to the local pod’s JWT if Vault
                is running in Kubernetes.
            service_account_jwt_wo: |-
                - (Optional) Write-only JSON web token of the service account used by the secrets engine to manage Kubernetes credentials. This value is not stored in state.
                Note: This property is write-only and will not be read from the API.
            service_account_jwt_wo_version: |-
                - (Optional) Version counter for service_account_jwt_wo. Increment to force an update.
                For more information about write-only attributes, see
                using write-only attributes.
        importStatements: []
    vault_kubernetes_secret_backend_role:
        subCategory: ""
        description: Creates a role for the Kubernetes Secrets Engine in Vault.
        name: vault_kubernetes_secret_backend_role
        title: vault_kubernetes_secret_backend_role resource
        examples:
            - name: sa-example
              manifest: |-
                {
                  "allowed_kubernetes_namespaces": [
                    "*"
                  ],
                  "backend": "${vault_kubernetes_secret_backend.config.path}",
                  "extra_annotations": {
                    "env": "development",
                    "location": "earth"
                  },
                  "extra_labels": {
                    "id": "abc123",
                    "name": "some_name"
                  },
                  "name": "service-account-name-role",
                  "service_account_name": "test-service-account-with-generated-token",
                  "token_default_audiences": [
                    "https://kubernetes.default.svc"
                  ],
                  "token_default_ttl": 21600,
                  "token_max_ttl": 43200
                }
              references:
                backend: vault_kubernetes_secret_backend.config.path
              dependencies:
                vault_kubernetes_secret_backend.config: |-
                    {
                      "description": "kubernetes secrets engine description",
                      "disable_local_ca_jwt": false,
                      "kubernetes_ca_cert": "${file(\"/path/to/cert\")}",
                      "kubernetes_host": "https://127.0.0.1:61233",
                      "path": "kubernetes",
                      "service_account_jwt": "${file(\"/path/to/token\")}"
                    }
            - name: name-example
              manifest: |-
                {
                  "allowed_kubernetes_namespaces": [
                    "*"
                  ],
                  "backend": "${vault_kubernetes_secret_backend.config.path}",
                  "extra_annotations": {
                    "env": "development",
                    "location": "earth"
                  },
                  "extra_labels": {
                    "id": "abc123",
                    "name": "some_name"
                  },
                  "kubernetes_role_name": "vault-k8s-secrets-role",
                  "name": "service-account-name-role",
                  "token_default_ttl": 21600,
                  "token_max_ttl": 43200
                }
              references:
                backend: vault_kubernetes_secret_backend.config.path
              dependencies:
                vault_kubernetes_secret_backend.config: |-
                    {
                      "description": "kubernetes secrets engine description",
                      "disable_local_ca_jwt": false,
                      "kubernetes_ca_cert": "${file(\"/path/to/cert\")}",
                      "kubernetes_host": "https://127.0.0.1:61233",
                      "path": "kubernetes",
                      "service_account_jwt": "${file(\"/path/to/token\")}"
                    }
            - name: rules-example
              manifest: |-
                {
                  "allowed_kubernetes_namespaces": [
                    "*"
                  ],
                  "backend": "${vault_kubernetes_secret_backend.config.path}",
                  "extra_annotations": {
                    "env": "development",
                    "location": "earth"
                  },
                  "extra_labels": {
                    "id": "abc123",
                    "name": "some_name"
                  },
                  "generated_role_rules": "rules:\n- apiGroups: [\"\"]\n  resources: [\"pods\"]\n  verbs: [\"list\"]\n",
                  "kubernetes_role_type": "Role",
                  "name": "service-account-name-role",
                  "token_default_ttl": 21600,
                  "token_max_ttl": 43200
                }
              references:
                backend: vault_kubernetes_secret_backend.config.path
              dependencies:
                vault_kubernetes_secret_backend.config: |-
                    {
                      "description": "kubernetes secrets engine description",
                      "disable_local_ca_jwt": false,
                      "kubernetes_ca_cert": "${file(\"/path/to/cert\")}",
                      "kubernetes_host": "https://127.0.0.1:61233",
                      "path": "kubernetes",
                      "service_account_jwt": "${file(\"/path/to/token\")}"
                    }
        argumentDocs:
            allowed_kubernetes_namespace_selector: |-
                - (Optional) A label selector for Kubernetes namespaces
                in which credentials can be generated. Accepts either a JSON or YAML object. The value should be
                of type LabelSelector.
                If set with allowed_kubernetes_namespace, the conditions are ORed.
            allowed_kubernetes_namespaces: |-
                - (Optional) The list of Kubernetes namespaces this role
                can generate credentials for. If set to * all namespaces are allowed. If set with
                allowed_kubernetes_namespace_selector, the conditions are ORed.
            backend: |-
                - (Required) The path of the Kubernetes Secrets Engine backend mount to create
                the role in.
            extra_annotations: |-
                - (Optional) Additional annotations to apply to all generated
                Kubernetes objects.
            extra_labels: |-
                - (Optional) Additional labels to apply to all generated Kubernetes
                objects.
            generated_role_rules: |-
                - (Optional) The Role or ClusterRole rules to use when generating
                a role. Accepts either JSON or YAML formatted rules. Mutually exclusive with service_account_name
                and kubernetes_role_name. If set, the entire chain of Kubernetes objects will be generated
                when credentials are requested.
            kubernetes_role_name: |-
                - (Optional) The pre-existing Role or ClusterRole to bind a
                generated service account to. Mutually exclusive with service_account_name and
                generated_role_rules. If set, Kubernetes token, service account, and role
                binding objects will be created when credentials are requested.
            kubernetes_role_type: |-
                - (Optional) Specifies whether the Kubernetes role is a Role or
                ClusterRole.
            name: '- (Required) The name of the role.'
            name_template: |-
                - (Optional) The name template to use when generating service accounts,
                roles and role bindings. If unset, a default template is used.
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            service_account_name: |-
                - (Optional) The pre-existing service account to generate tokens for.
                Mutually exclusive with kubernetes_role_name and generated_role_rules. If set, only a
                Kubernetes token will be created when credentials are requested.
            token_default_audiences: |-
                - (Optional) The default audiences for generated Kubernetes tokens.
                If not set, defaults to the Kubernetes cluster's default audiences. This field requires
                Vault 1.15 or later.
            token_default_ttl: '- (Optional) The default TTL for generated Kubernetes tokens in seconds.'
            token_max_ttl: '- (Optional) The maximum TTL for generated Kubernetes tokens in seconds.'
        importStatements: []
    vault_kv_secret:
        subCategory: ""
        description: Writes a KV-V1 secret to a given path in Vault
        name: vault_kv_secret
        title: vault_kv_secret resource
        examples:
            - name: secret
              manifest: |-
                {
                  "data_json": "${jsonencode(\n  {\n    zip = \"zap\",\n    foo = \"bar\"\n  }\n  )}",
                  "path": "${vault_mount.kvv1.path}/secret"
                }
              dependencies:
                vault_mount.kvv1: |-
                    {
                      "description": "KV Version 1 secret engine mount",
                      "options": {
                        "version": "1"
                      },
                      "path": "kvv1",
                      "type": "kv"
                    }
        argumentDocs:
            data: |-
                - A mapping whose keys are the top-level data keys returned from
                Vault and whose values are the corresponding values. This map can only
                represent string data, so any non-string values returned from Vault are
                serialized as JSON.
            data_json: |-
                - (Required) JSON-encoded string that will be
                written as the secret data at the given path.
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            path: '- (Required) Full path of the KV-V1 secret.'
        importStatements: []
    vault_kv_secret_backend_v2:
        subCategory: ""
        description: Configures KV-V2 backend level settings that are applied to every key in the key-value store.
        name: vault_kv_secret_backend_v2
        title: vault_kv_secret_backend_v2 resource
        examples:
            - name: example
              manifest: |-
                {
                  "cas_required": true,
                  "delete_version_after": 12600,
                  "max_versions": 5,
                  "mount": "${vault_mount.kvv2.path}"
                }
              references:
                mount: vault_mount.kvv2.path
              dependencies:
                vault_mount.kvv2: |-
                    {
                      "description": "KV Version 2 secret engine mount",
                      "options": {
                        "version": "2"
                      },
                      "path": "kvv2",
                      "type": "kv"
                    }
        argumentDocs:
            cas_required: |-
                - (Optional) If true, all keys will require the cas
                parameter to be set on all write requests.
            delete_version_after: |-
                - (Optional) If set, specifies the length of time before
                a version is deleted. Accepts duration in integer seconds.
            max_versions: '- (Optional) The number of versions to keep per key.'
            mount: '- (Required) Path where KV-V2 engine is mounted.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
        importStatements: []
    vault_kv_secret_v2:
        subCategory: ""
        description: Writes a KV-V2 secret to a given path in Vault
        name: vault_kv_secret_v2
        title: vault_kv_secret_v2 resource
        examples:
            - name: example
              manifest: |-
                {
                  "cas": 1,
                  "custom_metadata": [
                    {
                      "data": {
                        "bar": "12345",
                        "foo": "vault@example.com"
                      },
                      "max_versions": 5
                    }
                  ],
                  "data_json_wo": "${jsonencode(\n    {\n      zip = \"zap\",\n      foo = \"bar\"\n    }\n  )}",
                  "data_json_wo_version": 1,
                  "delete_all_versions": true,
                  "mount": "${vault_mount.kvv2.path}",
                  "name": "secret"
                }
              references:
                mount: vault_mount.kvv2.path
              dependencies:
                vault_mount.kvv2: |-
                    {
                      "description": "KV Version 2 secret engine mount",
                      "options": {
                        "version": "2"
                      },
                      "path": "kvv2",
                      "type": "kv"
                    }
        argumentDocs:
            cas: |-
                - (Optional) This flag is required if cas_required is set to true
                on either the secret or the engine's config. In order for a
                write operation to be successful, cas must be set to the current version
                of the secret.
            cas_required: |-
                - (Optional) If true, all keys will require the cas
                parameter to be set on all write requests.
            custom_metadata: |-
                - (Optional) A nested block that allows configuring metadata for the
                KV secret. Refer to the
                Configuration Options for more info.
            data: '- (Optional) A string to string map describing the secret.'
            data_json: |-
                - (Optional) JSON-encoded string that will be
                written as the secret data at the given path. This is required if data_json_wo is not set.
            data_json_wo: |-
                - (Optional) JSON-encoded string that will be
                written as the secret data at the given path. This is required if data_json is not set. Note: This property is write-only and will not be read from the API.
            data_json_wo_version: '- (Optional) The version of the data_json_wo. For more info see updating write-only attributes.'
            delete_all_versions: |-
                - (Optional) If set to true, permanently deletes all
                versions for the specified key.
            delete_version_after: |-
                - (Optional) If set, specifies the length of time before
                a version is deleted. Accepts duration in integer seconds.
            disable_read: |-
                - (Optional) If set to true, disables reading secret from Vault;
                note: drift won't be detected.
            max_versions: '- (Optional) The number of versions to keep per key.'
            metadata: '- Metadata associated with this secret read from Vault.'
            mount: '- (Required) Path where KV-V2 engine is mounted.'
            name: |-
                - (Required) Full name of the secret. For a nested secret
                the name is the nested path excluding the mount and data
                prefix. For example, for a secret at kvv2/data/foo/bar/baz
                the name is foo/bar/baz.
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            options: '- (Optional) An object that holds option settings.'
            path: '- Full path where the KV-V2 secret will be written.'
            vault_kv_secret_v2: |-
                to read back
                secret data from Vault
        importStatements: []
    vault_ldap_secret_backend:
        subCategory: ""
        description: Creates a LDAP secret backend for Vault.
        name: vault_ldap_secret_backend
        title: vault_ldap_secret_backend resource
        examples:
            - name: config
              manifest: |-
                {
                  "binddn": "CN=Administrator,CN=Users,DC=corp,DC=example,DC=net",
                  "bindpass": "SuperSecretPassw0rd",
                  "insecure_tls": "true",
                  "path": "my-custom-ldap",
                  "rotation_schedule": "0 * * * SAT",
                  "rotation_window": 3600,
                  "url": "ldaps://localhost",
                  "userdn": "CN=Users,DC=corp,DC=example,DC=net"
                }
        argumentDocs:
            allowed_managed_keys: '- (Optional) Set of managed key registry entry names that the mount in question is allowed to access'
            allowed_response_headers: |-
                - (Optional) List of headers to allow, allowing a plugin to include
                them in the response.
            audit_non_hmac_request_keys: '- (Optional) Specifies the list of keys that will not be HMAC''d by audit devices in the request data object.'
            audit_non_hmac_response_keys: '- (Optional) Specifies the list of keys that will not be HMAC''d by audit devices in the response data object.'
            binddn: '- (Required) Distinguished name of object to bind when performing user and group search.'
            bindpass: |-
                - (Optional) Password to use along with binddn when performing user search. Conflicts with bindpass_wo.
                Exactly one of bindpass or bindpass_wo must be provided.
            bindpass_wo: |-
                - (Optional) Write-only password to use along with binddn when performing user search. Can be updated. Conflicts with bindpass.
                Exactly one of bindpass or bindpass_wo must be provided.
                Note: This property is write-only and will not be read from the API.
            bindpass_wo_version: |-
                - (Optional) Version counter for write-only bind password.
                Required when using bindpass_wo. For more information about write-only attributes, see
                using write-only attributes.
            certificate: |-
                - (Optional) CA certificate to use when verifying LDAP server certificate, must be
                x509 PEM encoded.
            client_tls_cert: '- (Optional) Client certificate to provide to the LDAP server, must be x509 PEM encoded.'
            client_tls_key: '- (Optional) Client certificate key to provide to the LDAP server, must be x509 PEM encoded.'
            connection_timeout: |-
                - (Optional) Timeout, in seconds, when attempting to connect to the LDAP server before trying
                the next URL in the configuration.
            credential_type: '- (Optional) The type of credential to generate. Valid values include password and phrase. Default is password.'
            default_lease_ttl_seconds: '- (Optional) Default lease duration for tokens and secrets in seconds'
            delegated_auth_accessors: |-
                - (Optional)  List of allowed authentication mount accessors the
                backend can request delegated authentication for.
            description: '- (Optional) Human-friendly description of the mount'
            disable_automated_rotation: '- (Optional) Cancels all upcoming rotations of the root credential until unset. Requires Vault Enterprise 1.19+.'
            external_entropy_access: '- (Optional) Boolean flag that can be explicitly set to true to enable the secrets engine to access Vault''s external entropy source'
            identity_token_key: |-
                - (Optional)  The key to use for signing plugin workload identity tokens. If
                not provided, this will default to Vault's OIDC default key. Requires Vault Enterprise 1.16+.
            insecure_tls: |-
                - (Optional) Skip LDAP server SSL Certificate verification. This is not recommended for production.
                Defaults to false.
            listing_visibility: |-
                - (Optional) Specifies whether to show this mount in the UI-specific
                listing endpoint. Valid values are unauth or hidden. If not set, behaves like hidden.
            local: '- (Optional) Boolean flag that can be explicitly set to true to enforce local mount in HA environment'
            max_lease_ttl_seconds: '- (Optional) Maximum possible lease duration for tokens and secrets in seconds'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            options: '- (Optional) Specifies mount type specific options that are passed to the backend'
            passthrough_request_headers: |-
                - (Optional) List of headers to allow and pass from the request to
                the plugin.
            password_policy: '- (Optional) Name of the password policy to use to generate passwords.'
            path: |-
                - (Optional) The unique path this backend should be mounted at. Must
                not begin or end with a /. Defaults to ldap.
            plugin_version: |-
                - (Optional) Specifies the semantic version of the plugin to use, e.g. "v1.0.0".
                If unspecified, the server will select any matching unversioned plugin that may have been
                registered, the latest versioned plugin registered, or a built-in plugin in that order of precedence.
            request_timeout: |-
                - (Optional) Timeout, in seconds, for the connection when making requests against the server
                before returning back an error.
            rotation_period: |-
                - (Optional) The amount of time in seconds Vault should wait before rotating the root credential.
                A zero value tells Vault not to rotate the root credential. The minimum rotation period is 10 seconds. Requires Vault Enterprise 1.19+.
            rotation_schedule: |-
                - (Optional) The schedule, in cron-style time format,
                defining the schedule on which Vault should rotate the root token. Requires Vault Enterprise 1.19+.
            rotation_window: |-
                - (Optional) The maximum amount of time in seconds allowed to complete
                a rotation when a scheduled token rotation occurs. The default rotation window is
                unbound and the minimum allowable window is 3600. Requires Vault Enterprise 1.19+.
            schema: '- (Optional)  The LDAP schema to use when storing entry passwords. Valid schemas include openldap, ad, and racf. Default is openldap.'
            seal_wrap: '- (Optional) Boolean flag that can be explicitly set to true to enable seal wrapping for the mount, causing values stored by the mount to be wrapped by the seal''s encryption capability'
            self_managed: |-
                - (Optional) If true, Vault performs rotations by authenticating as this account
                using its current password (no privileged bind DN). Immutable after creation. Enforces password
                requirement when creating static roles. Requires Vault Enterprise 2.0+.
            skip_static_role_import_rotation: |-
                - (Optional) If set to true, static roles will not be rotated during import.
                Defaults to false. Requires Vault 1.16 or above.
            starttls: '- (Optional) Issue a StartTLS command after establishing unencrypted connection.'
            upndomain: '- (Optional) Enables userPrincipalDomain login with [username]@UPNDomain.'
            url: |-
                - (Required) LDAP URL to connect to. Multiple URLs can be specified by concatenating
                them with commas; they will be tried in-order. Defaults to ldap://127.0.0.1.
            userattr: '- (Optional) Attribute used when searching users. Defaults to cn.'
            userdn: '- (Optional) LDAP domain to use for users (eg: ou=People,dc=example,dc=org)`.'
        importStatements: []
    vault_ldap_secret_backend_dynamic_role:
        subCategory: ""
        description: Creates a dynamic role for the LDAP secret backend for Vault.
        name: vault_ldap_secret_backend_dynamic_role
        title: vault_ldap_secret_backend_dynamic_role resource
        examples:
            - name: role
              manifest: |-
                {
                  "creation_ldif": "dn: cn={{.Username}},ou=users,dc=learn,dc=example\nobjectClass: person\nobjectClass: top\ncn: learn\nsn: {{ random 20 }}\nmemberOf: cn=dev,ou=groups,dc=learn,dc=example\nuserPassword: {{.Password}}\n",
                  "deletion_ldif": "dn: cn={{.Username}},ou=users,dc=learn,dc=example\nchangetype: delete\n",
                  "mount": "${vault_ldap_secret_backend.config.path}",
                  "role_name": "alice",
                  "rollback_ldif": "dn: cn={{.Username}},ou=users,dc=learn,dc=example\nchangetype: delete\n"
                }
              references:
                mount: vault_ldap_secret_backend.config.path
              dependencies:
                vault_ldap_secret_backend.config: |-
                    {
                      "binddn": "CN=Administrator,CN=Users,DC=corp,DC=example,DC=net",
                      "bindpass": "SuperSecretPassw0rd",
                      "path": "my-custom-ldap",
                      "url": "ldaps://localhost",
                      "userdn": "CN=Users,DC=corp,DC=example,DC=net"
                    }
        argumentDocs:
            creation_ldif: |-
                - (Required) A templatized LDIF string used to create a user
                account. This may contain multiple LDIF entries. The creation_ldif can also
                be used to add the user account to an existing group. All LDIF entries are
                performed in order. If Vault encounters an error while executing the
                creation_ldif it will stop at the first error and not execute any remaining
                LDIF entries. If an error occurs and rollback_ldif is specified, the LDIF
                entries in rollback_ldif will be executed. See rollback_ldif for more
                details. This field may optionally be provided as a base64 encoded string.
            default_ttl: '- (Optional) Specifies the TTL for the leases associated with this role.'
            deletion_ldif: |-
                - (Required) A templatized LDIF string used to delete the
                user account once its TTL has expired. This may contain multiple LDIF
                entries. All LDIF entries are performed in order. If Vault encounters an
                error while executing an entry in the deletion_ldif it will attempt to
                continue executing any remaining entries. This field may optionally be
                provided as a base64 encoded string.
            max_ttl: '- (Optional) Specifies the maximum TTL for the leases associated with this role.'
            mount: |-
                - (Optional) The unique path this backend should be mounted at. Must
                not begin or end with a /. Defaults to ldap.
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            role_name: '- (Required) Name of the role.'
            rollback_ldif: |-
                - (Optional) A templatized LDIF string used to attempt to
                rollback any changes in the event that execution of the creation_ldif results
                in an error. This may contain multiple LDIF entries. All LDIF entries are
                performed in order. If Vault encounters an error while executing an entry in
                the rollback_ldif it will attempt to continue executing any remaining
                entries. This field may optionally be provided as a base64 encoded string.
            username_template: |-
                - (Optional) A template used to generate a dynamic
                username. This will be used to fill in the .Username field within the
                creation_ldif string.
        importStatements: []
    vault_ldap_secret_backend_library_set:
        subCategory: ""
        description: Creates a library on the LDAP Secret Backend for Vault.
        name: vault_ldap_secret_backend_library_set
        title: vault_ldap_secret_backend_library_set resource
        examples:
            - name: qa
              manifest: |-
                {
                  "disable_check_in_enforcement": true,
                  "max_ttl": 120,
                  "mount": "${vault_ldap_secret_backend.config.path}",
                  "name": "qa",
                  "service_account_names": [
                    "Bob",
                    "Mary"
                  ],
                  "ttl": 60
                }
              references:
                mount: vault_ldap_secret_backend.config.path
              dependencies:
                vault_ldap_secret_backend.config: |-
                    {
                      "binddn": "CN=Administrator,CN=Users,DC=corp,DC=example,DC=net",
                      "bindpass": "SuperSecretPassw0rd",
                      "insecure_tls": "true",
                      "path": "ldap",
                      "url": "ldaps://localhost",
                      "userdn": "CN=Users,DC=corp,DC=example,DC=net"
                    }
        argumentDocs:
            disable_check_in_enforcement: |-
                - (Optional) Disable enforcing that service
                accounts must be checked in by the entity or client token that checked them
                out. Defaults to false.
            max_ttl: |-
                - (Optional) The maximum password time-to-live in seconds. Defaults
                to the configuration max_ttl if not provided.
            name: |-
                - (Required) The name to identify this set of service accounts.
                Must be unique within the backend.
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            path: |-
                - (Required) The path the LDAP secret backend is mounted at,
                with no leading or trailing /s.
            service_account_names: '- (Required) Specifies the slice of service accounts mapped to this set.'
            ttl: |-
                - (Optional) The password time-to-live in seconds. Defaults to the configuration
                ttl if not provided.
        importStatements: []
    vault_ldap_secret_backend_static_role:
        subCategory: ""
        description: Creates a static role for the LDAP secret backend for Vault.
        name: vault_ldap_secret_backend_static_role
        title: vault_ldap_secret_backend_static_role resource
        examples:
            - name: role
              manifest: |-
                {
                  "dn": "cn=alice,ou=Users,DC=corp,DC=example,DC=net",
                  "mount": "${vault_ldap_secret_backend.config.path}",
                  "role_name": "alice",
                  "rotation_period": 60,
                  "username": "alice"
                }
              references:
                mount: vault_ldap_secret_backend.config.path
              dependencies:
                vault_ldap_secret_backend.config: |-
                    {
                      "binddn": "CN=Administrator,CN=Users,DC=corp,DC=example,DC=net",
                      "bindpass": "SuperSecretPassw0rd",
                      "insecure_tls": "true",
                      "path": "my-custom-ldap",
                      "url": "ldaps://localhost",
                      "userdn": "CN=Users,DC=corp,DC=example,DC=net"
                    }
        argumentDocs:
            disable_automated_rotation: '- (Optional) Cancels all upcoming rotations of the static credential until unset. Requires Vault Enterprise 2.0+.'
            dn: |-
                - (Optional) Distinguished name (DN) of the existing LDAP entry to manage
                password rotation for. If given, it will take precedence over username for the LDAP
                search performed during password rotation. Cannot be modified after creation.
            mount: |-
                - (Optional) The unique path this backend should be mounted at. Must
                not begin or end with a /. Defaults to ldap.
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            password_wo: |-
                - (Optional) The password for the user. Can be updated.
                Note: This property is write-only and will not be read from the API.
                Requires Vault Enterprise 2.0+.
            password_wo_version: |-
                - (Optional) The version of the password_wo. For more info see updating write-only attributes.
                Requires Vault Enterprise 2.0+.
            role_name: '- (Required) Name of the role.'
            rotation_period: |-
                - (Optional) The amount of time in seconds Vault should wait before rotating the static credential.
                A zero value tells Vault not to rotate the credential. The minimum rotation period is 10 seconds. Requires Vault Enterprise 2.0+.
            rotation_policy: '- (Optional) The rotation policy to use for this credential. Requires Vault Enterprise 2.0+.'
            rotation_schedule: |-
                - (Optional) The schedule, in cron-style time format,
                defining the schedule on which Vault should rotate the static credential. Requires Vault Enterprise 2.0+.
            rotation_window: |-
                - (Optional) The maximum amount of time in seconds allowed to complete
                a rotation when a scheduled rotation occurs. The default rotation window is
                unbound and the minimum allowable window is 3600. Requires Vault Enterprise 2.0+.
            skip_import_rotation: |-
                - (Optional) Causes vault to skip the initial secret rotation on import. Not applicable to updates.
                Requires Vault 1.16 or above.
            username: '- (Required) The username of the existing LDAP entry to manage password rotation for.'
        importStatements: []
    vault_managed_keys:
        subCategory: ""
        description: Configures Managed Keys in Vault
        name: vault_managed_keys
        title: vault_managed_keys resource
        examples:
            - name: keys
              manifest: |-
                {
                  "aws": [
                    {
                      "access_key": "${var.aws_access_key}",
                      "key_bits": "2048",
                      "key_type": "RSA",
                      "kms_key": "alias/vault_aws_key_1",
                      "name": "aws-key-1",
                      "secret_key": "${var.aws_secret_key}"
                    },
                    {
                      "access_key": "${var.aws_access_key}",
                      "key_bits": "4096",
                      "key_type": "RSA",
                      "kms_key": "alias/vault_aws_key_2",
                      "name": "aws-key-2",
                      "secret_key": "${var.aws_secret_key}"
                    }
                  ]
                }
              references:
                aws.access_key: var.aws_access_key
                aws.secret_key: var.aws_secret_key
              dependencies:
                vault_mount.pki: |-
                    {
                      "allowed_managed_keys": [
                        "${tolist(vault_managed_keys.keys.aws)[0].name}",
                        "${tolist(vault_managed_keys.keys.aws)[1].name}"
                      ],
                      "default_lease_ttl_seconds": 3600,
                      "description": "Example mount for managed keys",
                      "max_lease_ttl_seconds": 36000,
                      "path": "pki",
                      "type": "pki"
                    }
            - name: gcp_keys
              manifest: |-
                {
                  "gcp": [
                    {
                      "algorithm": "rsa_sign_pkcs1_2048_sha256",
                      "credentials": "${file(\"sa-credentials.json\")}",
                      "crypto_key": "vault-key",
                      "key_ring": "vault-keyring",
                      "name": "gcp-key-1",
                      "project": "${var.gcp_project}",
                      "region": "us-east1"
                    }
                  ]
                }
              references:
                gcp.project: var.gcp_project
              dependencies:
                vault_mount.pki: |-
                    {
                      "allowed_managed_keys": [
                        "${tolist(vault_managed_keys.gcp_keys.gcp)[0].name}"
                      ],
                      "default_lease_ttl_seconds": 3600,
                      "description": "Example PKI mount using GCP Cloud KMS managed key",
                      "max_lease_ttl_seconds": 36000,
                      "path": "pki",
                      "type": "pki"
                    }
        argumentDocs:
            access_key: '- (Required) The AWS access key to use.'
            algorithm: '- (Required) The signature algorithm to be used with the key. Supported values are:'
            allow_generate_key: |-
                - (Optional) If no existing key can be found in
                the referenced backend, instructs Vault to generate a key within the backend.
            allow_replace_key: |-
                - (Optional) Controls the ability for Vault to replace through
                generation or importing a key into the configured backend even
                if a key is present, if set to false those operations are forbidden
                if a key exists.
            allow_store_key: |-
                - (Optional) Controls the ability for Vault to import a key to the
                configured backend, if false, those operations will be forbidden.
            any_mount: |-
                - (Optional) If true, allows usage from any mount point within the
                namespace.
            client_id: '- (Required) The client id for credentials to query the Azure APIs.'
            client_secret: '- (Required) The client secret for credentials to query the Azure APIs.'
            credentials: |-
                - (Required) The GCP service account credentials JSON contents (the raw JSON
                key data), not a path to a credentials file.
            crypto_key: '- (Required) The name of the Cloud KMS crypto key to use.'
            crypto_key_version: '- (Optional) The version of the key to use. (Default: 1)'
            curve: |-
                - (Optional) The curve to use for an ECDSA key. Used when key_type
                is ECDSA. Required if allow_generate_key is true.
            endpoint: '- (Optional) Used to specify a custom AWS endpoint.'
            environment: '- (Optional) The Azure Cloud environment API endpoints to use.'
            force_rw_session: |-
                - (Optional) Force all operations to open up a read-write session to
                the HSM.
            key_bits: '- (Required) The size in bits for an RSA key.'
            key_id: '- (Required) The id of a PKCS#11 key to use.'
            key_label: '- (Required) The label of the key to use.'
            key_name: '- (Required) The Key Vault key to use for encryption and decryption.'
            key_ring: '- (Required) The name of the Cloud KMS key ring.'
            key_type: '- (Required) The type of key to use.'
            kms_key: '- (Required) An identifier for the key.'
            library: |-
                - (Required) The name of the kms_library stanza to use from Vault's config
                to lookup the local library path.
            mechanism: |-
                - (Required) The encryption/decryption mechanism to use, specified as a
                hexadecimal (prefixed by 0x) string.
            name: '- (Required) A unique lowercase name that serves as identifying the key.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            pin: '- (Required) The PIN for login.'
            project: '- (Required) The GCP project ID where the Cloud KMS resources are located.'
            region: '- (Optional) The AWS region where the keys are stored (or will be stored).'
            resource: '- (Optional) The Azure Key Vault resource''s DNS Suffix to connect to.'
            secret_key: '- (Required) The AWS access key to use.'
            slot: |-
                - (Optional) The slot number to use, specified as a string in a decimal format
                (e.g. 2305843009213693953).
            tenant_id: '- (Required) The tenant id for the Azure Active Directory organization.'
            token_label: '- (Optional) The slot token label to use.'
            vault_name: '- (Required) The Key Vault vault to use for encryption and decryption.'
        importStatements: []
    vault_mfa_duo:
