                kms_name: vault_keymgmt_azure_kms.azure.name
                mount: vault_mount.keymgmt.path
              dependencies:
                vault_keymgmt_azure_kms.azure: |-
                    {
                      "credentials_wo": {
                        "client_id": "${var.azure_client_id}",
                        "client_secret": "${var.azure_client_secret}",
