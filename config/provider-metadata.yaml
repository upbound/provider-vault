    vault_pki_secret_backend_cert:
        subCategory: ""
        description: Generate an PKI certificate.
        name: vault_pki_secret_backend_cert
        title: vault_pki_secret_backend_cert resource
        examples:
            - name: app
              manifest: |-
                {
                  "backend": "${vault_mount.intermediate.path}",
                  "common_name": "app.my.domain",
                  "depends_on": [
                    "${vault_pki_secret_backend_role.admin}"
                  ],
                  "name": "${vault_pki_secret_backend_role.test.name}"
                }
              references:
                backend: vault_mount.intermediate.path
                name: vault_pki_secret_backend_role.test.name
        argumentDocs:
            alt_names: '- (Optional) List of alternative names'
            auto_renew: '- (Optional) If set to true, certs will be renewed if the expiration is within min_seconds_remaining. Default false'
            backend: '- (Required) The PKI secret backend the resource belongs to.'
            ca_chain: '- The CA chain'
            cert_metadata: (Optional) - A base 64 encoded value or an empty string to associate with the certificate's serial number. The role's no_store_metadata must be set to false, otherwise an error is returned when specified.
            certificate: '- The certificate'
            common_name: '- (Required) CN of certificate to create'
            exclude_cn_from_sans: '- (Optional) Flag to exclude CN from SANs'
            expiration: '- The expiration date of the certificate in unix epoch format'
            format: '- (Optional) The format of data'
            ip_sans: '- (Optional) List of alternative IPs'
            issuing_ca: '- The issuing CA'
            min_seconds_remaining: '- (Optional) Generate a new certificate when the expiration is within this number of seconds, default is 604800 (7 days)'
            name: '- (Required) Name of the role to create the certificate against'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            not_after: (Optional) - Set the Not After field of the certificate with specified date value. The value format should be given in UTC format YYYY-MM-ddTHH:MM:SSZ. Supports the Y10K end date for IEEE 802.1AR-2018 standard devices, 9999-12-31T23:59:59Z.
            other_sans: '- (Optional) List of other SANs'
            private_key: '- The private key'
            private_key_format: '- (Optional) The private key format'
            private_key_type: '- The private key type'
            remove_roots_from_chain: (Optional) - If set to true, the returned ca_chain field will not include any self-signed CA certificates. Useful if end-users already have the root CA in their trust store. Default false.
            renew_pending: '- true if the current time (during refresh) is after the start of the early renewal window declared by min_seconds_remaining, and false otherwise; if auto_renew is set to true then the provider will plan to replace the certificate once renewal is pending.'
            revoke: '- If set to true, the certificate will be revoked on resource destruction using the revoke PKI API. Conflicts with revoke_with_key. Default false.'
            revoke_with_key: '- If set to true, the certificate will be revoked on resource destruction using the revoke-with-key PKI API. Conflicts with revoke. Default false'
            serial_number: '- The serial number'
            ttl: '- (Optional) Time to live'
            uri_sans: '- (Optional) List of alternative URIs'
            user_ids: '- (Optional) List of Subject User IDs'
        importStatements: []
    vault_pki_secret_backend_config_acme:
        subCategory: ""
        description: Sets the ACME configuration on a PKI Secret Backend for Vault.
        name: vault_pki_secret_backend_config_acme
        title: vault_pki_secret_backend_config_acme resource
        examples:
            - name: example
              manifest: |-
                {
                  "allow_role_ext_key_usage": false,
                  "allowed_issuers": [
                    "*"
                  ],
                  "allowed_roles": [
                    "*"
                  ],
                  "backend": "${vault_mount.pki.path}",
                  "default_directory_policy": "sign-verbatim",
                  "dns_resolver": "",
                  "eab_policy": "not-required",
                  "enabled": true
                }
              references:
                backend: vault_mount.pki.path
              dependencies:
                vault_mount.pki: |-
                    {
                      "default_lease_ttl_seconds": 3600,
                      "max_lease_ttl_seconds": 86400,
                      "path": "pki",
                      "type": "pki"
                    }
                vault_pki_secret_backend_config_cluster.pki_config_cluster: |-
                    {
                      "aia_path": "http://127.0.0.1:8200/v1/pki",
                      "backend": "${vault_mount.pki.path}",
                      "path": "http://127.0.0.1:8200/v1/pki"
                    }
        argumentDocs:
            allow_role_ext_key_usage: '- (Optional) Specifies whether the ExtKeyUsage field from a role is used. Vault 1.14.1+'
            allowed_issuers: '- (Optional) Specifies which issuers are allowed for use with ACME.'
            allowed_roles: '- (Optional) Specifies which roles are allowed for use with ACME.'
            backend: '- (Required) The path the PKI secret backend is mounted at, with no leading or trailing /s.'
            challenge_excluded_ip_ranges: '- (Optional) List of CIDR blocks specifying IP ranges that are not allowed to complete ACME challenges. Vault 1.19.16+'
            challenge_permitted_ip_ranges: '- (Optional) List of CIDR blocks specifying IP ranges that are allowed to complete ACME challenges. Vault 1.19.16+'
            default_directory_policy: |-
                - (Optional) Specifies the policy to be used for non-role-qualified ACME requests.
                Allowed values are forbid, sign-verbatim, role:<role_name>, external-policy or external-policy:<policy>.
            dns_resolver: |-
                - (Optional) DNS resolver to use for domain resolution on this mount.
                Must be in the format <host>:<port>, with both parts mandatory.
            eab_policy: |-
                - (Optional) Specifies the policy to use for external account binding behaviour.
                Allowed values are not-required, new-account-required or always-required.
            enabled: '- (Required) Specifies whether ACME is enabled.'
            max_ttl: '- (Optional) The maximum TTL in seconds for certificates issued by ACME. Vault 1.17.0+'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
        importStatements: []
    vault_pki_secret_backend_config_auto_tidy:
        subCategory: ""
        description: Sets the Auto Tidy configuration on a PKI Secret Backend for Vault.
        name: vault_pki_secret_backend_config_auto_tidy
        title: vault_pki_secret_backend_config_auto_tidy resource
        examples:
            - name: test
              manifest: |-
                {
                  "backend": "${vault_mount.pki.path}",
                  "enabled": true,
                  "interval_duration": "1h",
                  "tidy_cert_store": true
                }
              references:
                backend: vault_mount.pki.path
              dependencies:
                vault_mount.pki: |-
                    {
                      "default_lease_ttl_seconds": 3600,
                      "max_lease_ttl_seconds": 86400,
                      "path": "pki",
                      "type": "pki"
                    }
        argumentDocs:
            backend: |-
                - (Required) The path to the PKI secret backend to
                read the configuration from, with no leading or trailing /s.
            enabled: '- (Optional) Specifies whether automatic tidy is enabled or not.'
            interval_duration: |-
                - (Optional) Interval at which to run an auto-tidy operation. This is the time
                between tidy invocations (after one finishes to the start of the next).
            issuer_safety_buffer: |-
                - (Optional) The amount of extra time that must have passed beyond issuer's
                expiration before it is removed from the backend storage.
            maintain_stored_certificate_counts: |-
                - (Optional) This configures whether stored certificate are
                counted upon initialization of the backend, and whether during normal operation, a running count
                of certificates stored is maintained.
            max_startup_backoff_duration: |-
                - (Optional) The maximum amount of time auto-tidy will be delayed
                after startup.
            min_startup_backoff_duration: |-
                - (Optional) The minimum amount of time auto-tidy will be delayed
                after startup.
            namespace: |-
                - (Optional) The namespace of the target resource.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            pause_duration: '- (Optional) The amount of time to wait between processing certificates.'
            publish_stored_certificate_count_metrics: |-
                - (Optional) This configures whether the stored
                certificate count is published to the metrics consumer.
            revocation_queue_safety_buffer: |-
                - (Optional) The amount of time that must pass from the
                cross-cluster revocation request being initiated to when it will be slated for removal.
            safety_buffer: |-
                - (Optional) The amount of extra time that must have passed beyond certificate
                expiration before it is removed from the backend storage and/or revocation list.
            tidy_acme: '- (Optional) Set to true to enable tidying ACME accounts, orders and authorizations.'
            tidy_cert_metadata: '- (Optional) Set to true to enable tidying up certificate metadata.'
            tidy_cert_store: '- (Optional) Set to true to enable tidying up the certificate store'
            tidy_cmpv2_nonce_store: '- (Optional) Set to true to enable tidying up the CMPv2 nonce store.'
            tidy_cross_cluster_revoked_certs: |-
                - (Optional) Set to true to enable tidying up the cross-cluster
                revoked certificate store.
            tidy_expired_issuers: |-
                - (Optional) Set to true to automatically remove expired issuers past the
                issuer_safety_buffer. No keys will be removed as part of this operation.
            tidy_move_legacy_ca_bundle: |-
                - (Optional) Set to true to move the legacy ca_bundle from
                /config/ca_bundle to /config/ca_bundle.bak.
            tidy_revocation_queue: |-
                - (Optional) Set to true to remove stale revocation queue entries that
                haven't been confirmed by any active cluster.
            tidy_revoked_cert_issuer_associations: |-
                - (Optional) Set to true to validate issuer associations
                on revocation entries. This helps increase the performance of CRL building and OCSP responses.
            tidy_revoked_certs: |-
                - (Optional) Set to true to remove all invalid and expired certificates from
                storage. A revoked storage entry is considered invalid if the entry is empty, or the value within
                the entry is empty. If a certificate is removed due to expiry, the entry will also be removed from
                the CRL, and the CRL will be rotated.
        importStatements: []
    vault_pki_secret_backend_config_ca:
        subCategory: ""
        description: Submit the CA information to PKI.
        name: vault_pki_secret_backend_config_ca
        title: vault_pki_secret_backend_config_ca resource
        examples:
            - name: intermediate
              manifest: |-
                {
                  "backend": "${vault_mount.intermediate.path}",
                  "depends_on": [
