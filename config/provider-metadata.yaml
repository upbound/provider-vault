    vault_pki_secret_backend_config_cluster:
        subCategory: ""
        description: Sets the cluster configuration on an PKI Secret Backend for Vault.
        name: vault_pki_secret_backend_config_cluster
        title: vault_pki_secret_backend_config_cluster resource
        examples:
            - name: example
              manifest: |-
                {
                  "aia_path": "http://127.0.0.1:8200/v1/pki-root",
                  "backend": "${vault_mount.root.path}",
                  "path": "http://127.0.0.1:8200/v1/pki-root"
                }
              references:
                backend: vault_mount.root.path
              dependencies:
                vault_mount.root: |-
                    {
                      "default_lease_ttl_seconds": 8640000,
                      "description": "root PKI",
                      "max_lease_ttl_seconds": 8640000,
                      "path": "pki-root",
                      "type": "pki"
                    }
        argumentDocs:
            aia_path: '- (Required) Specifies the path to this performance replication cluster''s AIA distribution point.'
            backend: '- (Required) The path the PKI secret backend is mounted at, with no leading or trailing /s.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            path: '- (Required) Specifies the path to this performance replication cluster''s API mount path.'
        importStatements: []
    vault_pki_secret_backend_config_cmpv2:
        subCategory: ""
        description: Sets the CMPv2 configuration on a PKI Secret Backend for Vault.
        name: vault_pki_secret_backend_config_cmpv2
        title: vault_pki_secret_backend_config_cmpv2 resource
        examples:
            - name: example
              manifest: |-
                {
                  "audit_fields": [
                    "csr",
                    "common_name",
                    "alt_names",
                    "ip_sans",
                    "uri_sans",
                    "other_sans",
                    "signature_bits",
                    "exclude_cn_from_sans",
                    "ou",
                    "organization",
                    "country",
                    "locality",
                    "province",
                    "street_address",
                    "postal_code",
                    "serial_number",
                    "use_pss",
                    "key_type",
                    "key_bits",
                    "add_basic_constraints"
                  ],
                  "authenticators": [
                    {
                      "cert": {
                        "accessor": "test",
                        "cert_role": "cert-auth-role"
                      }
                    }
                  ],
                  "backend": "${vault_mount.pki.path}",
                  "default_path_policy": "${format(\"role:%s\", vault_pki_secret_backend_role.cmpv2_role.name)}",
                  "disabled_validations": [
                    "DisableMatchingKeyIdValidation"
                  ],
                  "enable_sentinel_parsing": true,
                  "enabled": true
                }
              references:
                backend: vault_mount.pki.path
              dependencies:
                vault_mount.pki: |-
                    {
                      "description": "PKI secret engine mount",
                      "path": "pki-root",
                      "type": "pki"
                    }
                vault_pki_secret_backend_role.cmpv2_role: |-
                    {
                      "backend": "${vault_mount.pki.path}",
                      "key_bits": "256",
                      "key_type": "ec",
                      "name": "cmpv2-role",
                      "ttl": 3600
                    }
                vault_pki_secret_backend_role.cmpv2_role_2: |-
                    {
                      "backend": "${vault_mount.pki.path}",
                      "key_bits": "256",
                      "key_type": "ec",
                      "name": "cmpv2-role-2",
                      "ttl": 3600
                    }
        argumentDocs:
            audit_fields: '- (Optional) Fields parsed from the CSR that appear in the audit and can be used by sentinel policies.'
            authenticators: '- (Optional) Lists the mount accessors CMPv2 should delegate authentication requests towards (see below for nested schema).'
            backend: |-
                - (Required) The path to the PKI secret backend to
                read the CMPv2 configuration from, with no leading or trailing /s.
            cert: '- "The accessor (required) and cert_role (optional) properties for cert auth backends".'
            default_path_policy: '- (Optional) Specifies the behavior for requests using the non-role-qualified CMPv2 requests. Can be sign-verbatim or a role given by role:<role_name>.'
            disabled_validations: '- (Optional) A comma-separated list of validations not to perform on CMPv2 messages.'
            enable_sentinel_parsing: '- (Optional) If set, parse out fields from the provided CSR making them available for Sentinel policies.'
            enabled: '- (Optional) Specifies whether CMPv2 is enabled.'
            last_updated: '- A read-only timestamp representing the last time the configuration was updated.'
            namespace: |-
                - (Optional) The namespace of the target resource.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
        importStatements: []
    vault_pki_secret_backend_config_est:
        subCategory: ""
        description: Sets the EST configuration on a PKI Secret Backend for Vault.
        name: vault_pki_secret_backend_config_est
        title: vault_pki_secret_backend_config_est resource
        examples:
            - name: example
              manifest: |-
                {
                  "audit_fields": [
                    "csr",
                    "common_name",
                    "alt_names",
                    "ip_sans",
                    "uri_sans",
                    "other_sans",
                    "signature_bits",
                    "exclude_cn_from_sans",
                    "ou",
                    "organization",
                    "country",
                    "locality",
                    "province",
                    "street_address",
                    "postal_code",
                    "serial_number",
                    "use_pss",
                    "key_type",
                    "key_bits",
                    "add_basic_constraints"
                  ],
                  "authenticators": [
                    {
                      "cert": {
                        "accessor": "test",
                        "cert_role": "cert-auth-role"
                      },
                      "userpass": {
                        "accessor": "test2"
                      }
                    }
                  ],
                  "backend": "${vault_mount.pki.path}",
                  "default_mount": true,
                  "default_path_policy": "${format(\"role:%s\", vault_pki_secret_backend_role.est_role.name)}",
                  "enable_sentinel_parsing": true,
                  "enabled": true,
                  "label_to_path_policy": {
                    "test-label": "sign-verbatim",
                    "test-label-2": "${format(\"role:%s\", vault_pki_secret_backend_role.est_role_2.name)}"
                  }
                }
              references:
                backend: vault_mount.pki.path
              dependencies:
                vault_mount.pki: |-
                    {
                      "description": "PKI secret engine mount",
                      "path": "pki-root",
                      "type": "pki"
                    }
                vault_pki_secret_backend_role.est_role: |-
                    {
                      "backend": "${vault_mount.pki.path}",
                      "key_bits": "256",
                      "key_type": "ec",
                      "name": "est-role",
                      "ttl": 3600
                    }
                vault_pki_secret_backend_role.est_role_2: |-
                    {
                      "backend": "${vault_mount.pki.path}",
                      "key_bits": "256",
                      "key_type": "ec",
                      "name": "est-role-2",
                      "ttl": 3600
                    }
        argumentDocs:
            audit_fields: '- (Optional) Fields parsed from the CSR that appear in the audit and can be used by sentinel policies.'
            authenticators: '- (Optional) Lists the mount accessors EST should delegate authentication requests towards (see below for nested schema).'
            backend: |-
                - (Required) The path to the PKI secret backend to
                read the EST configuration from, with no leading or trailing /s.
            cert: '- The accessor (required) and cert_role (optional) properties for cert auth backends.'
            default_mount: '- (Optional) If set, this mount will register the default .well-known/est URL path. Only a single mount can enable this across a Vault cluster.'
            default_path_policy: '- (Optional) Required to be set if default_mount is enabled. Specifies the behavior for requests using the default EST label. Can be sign-verbatim or a role given by role:<role_name>.'
            enable_sentinel_parsing: '- (Optional) If set, parse out fields from the provided CSR making them available for Sentinel policies.'
            enabled: '- (Optional) Specifies whether EST is enabled.'
            label_to_path_policy: '- (Optional) Configures a pairing of an EST label with the redirected behavior for requests hitting that role. The path policy can be sign-verbatim or a role given by role:<role_name>. Labels must be unique across Vault cluster, and will register .well-known/est/ URL paths.'
            last_updated: '- A read-only timestamp representing the last time the configuration was updated.'
            namespace: |-
                - (Optional) The namespace of the target resource.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            userpass: '- The accessor (required) property for user pass auth backends.'
        importStatements: []
    vault_pki_secret_backend_config_issuers:
        subCategory: ""
        description: Allows setting the value of the default issuer.
        name: vault_pki_secret_backend_config_issuers
        title: vault_pki_secret_backend_config_issuers resource
        examples:
            - name: config
              manifest: |-
                {
                  "backend": "${vault_mount.pki.path}",
                  "default": "${vault_pki_secret_backend_issuer.example.issuer_id}",
                  "default_follows_latest_issuer": true
                }
              references:
                backend: vault_mount.pki.path
                default: vault_pki_secret_backend_issuer.example.issuer_id
              dependencies:
                vault_mount.pki: |-
                    {
                      "default_lease_ttl_seconds": 3600,
                      "max_lease_ttl_seconds": 86400,
                      "path": "pki",
                      "type": "pki"
                    }
                vault_pki_secret_backend_issuer.example: |-
                    {
                      "backend": "${vault_pki_secret_backend_root_cert.root.backend}",
                      "issuer_name": "example-issuer",
                      "issuer_ref": "${vault_pki_secret_backend_root_cert.root.issuer_id}"
                    }
                vault_pki_secret_backend_root_cert.root: |-
                    {
                      "backend": "${vault_mount.pki.path}",
                      "common_name": "test",
                      "ttl": "86400",
                      "type": "internal"
                    }
        argumentDocs:
            backend: |-
                - (Required) The path the PKI secret backend is mounted at, with no
                leading or trailing /s.
            default: |-
                - (Required) Specifies the default issuer using the issuer ID.
                NOTE: It is recommended to only set the default issuer using the ID.
                While Vault does allow passing in the issuer name, this can lead to possible drifts in the Terraform state.
            default_follows_latest_issuer: |-
                - (Optional) Specifies whether a root creation
                or an issuer import operation updates the default issuer to the newly added issuer.
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
        importStatements: []
    vault_pki_secret_backend_config_scep:
        subCategory: ""
        description: Sets the SCEP configuration on a PKI Secret Backend for Vault.
        name: vault_pki_secret_backend_config_scep
        title: vault_pki_secret_backend_config_scep resource
        examples:
            - name: test
              manifest: |-
                {
                  "authenticators": [
                    {
                      "scep": {
                        "accessor": "${vault_auth_backend.scep.accessor}",
                        "scep_role": "${vault_scep_auth_backend_role.scep_challenge.name}"
                      }
                    }
                  ],
                  "backend": "${vault_mount.pki.path}",
                  "default_path_policy": "sign-verbatim",
                  "enabled": true,
                  "restrict_ca_chain_to_issuer": true
                }
              references:
                backend: vault_mount.pki.path
              dependencies:
                vault_auth_backend.scep: |-
                    {
                      "path": "scep-auth",
                      "type": "scep"
                    }
                vault_mount.pki: |-
                    {
                      "description": "PKI secret engine mount",
                      "path": "pki_scep",
                      "type": "pki"
                    }
                vault_scep_auth_backend_role.scep_challenge: |-
                    {
                      "auth_type": "static-challenge",
                      "backend": "${vault_auth_backend.scep.id}",
                      "challenge": "ac7e4ada-c8ef-4393-9098-d69d08736833",
                      "display_name": "Static challenge for SCEP clients",
                      "name": "scep-auth"
                    }
        argumentDocs:
            allowed_digest_algorithms: '- (Optional) List of allowed digest algorithms for SCEP requests.'
            allowed_encryption_algorithms: '- (Optional) List of allowed encryption algorithms for SCEP requests.'
            authenticators: '- (Optional) Lists the mount accessors SCEP should delegate authentication requests towards (see below for nested schema).'
            backend: |-
                - (Required) The path to the PKI secret backend to
                read the SCEP configuration from, with no leading or trailing /s.
            cert: '- The accessor (required) and cert_role (optional) properties for cert auth backends.'
            default_path_policy: '- (Optional) Specifies the policy to be used for non-role-qualified SCEP requests; valid values are ''sign-verbatim'', or "role:<role_name>" to specify a role to use as this policy.'
            enabled: '- (Optional) Specifies whether SCEP is enabled.'
            external_validation: '- (Optional) Lists the 3rd party validation of SCEP requests (see below for nested schema).'
            intune: '- The tenant_id, client_id, client_secret and environment properties for Microsoft Intune validation of SCEP requests.'
            last_updated: '- A read-only timestamp representing the last time the configuration was updated.'
            log_level: '- (Optional) The level of logging verbosity, affects only SCEP logs on this mount.'
            namespace: |-
                - (Optional) The namespace of the target resource.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            restrict_ca_chain_to_issuer: '- (Optional) If true, only return the issuer CA, otherwise the entire CA certificate chain will be returned if available from the PKI mount.'
            scep: '- The accessor (required) property for scep auth backends.'
        importStatements: []
    vault_pki_secret_backend_config_urls:
        subCategory: ""
        description: Sets the config URL's on an PKI Secret Backend for Vault.
        name: vault_pki_secret_backend_config_urls
        title: vault_pki_secret_backend_config_urls resource
        examples:
            - name: example
              manifest: |-
                {
                  "backend": "${vault_mount.root.path}",
                  "issuing_certificates": [
                    "http://127.0.0.1:8200/v1/pki/ca"
                  ]
                }
              references:
                backend: vault_mount.root.path
              dependencies:
                vault_mount.root: |-
                    {
                      "default_lease_ttl_seconds": 8640000,
                      "description": "root PKI",
                      "max_lease_ttl_seconds": 8640000,
                      "path": "pki-root",
                      "type": "pki"
                    }
        argumentDocs:
            backend: '- (Required) The path the PKI secret backend is mounted at, with no leading or trailing /s.'
            crl_distribution_points: '- (Optional) Specifies the URL values for the CRL Distribution Points field.'
            enable_templating: '- (Optional) Specifies that templating of AIA fields is allowed.'
            issuing_certificates: '- (Optional) Specifies the URL values for the Issuing Certificate field.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            ocsp_servers: '- (Optional) Specifies the URL values for the OCSP Servers field.'
        importStatements: []
    vault_pki_secret_backend_crl_config:
        subCategory: ""
        description: Sets the CRL config on an PKI Secret Backend for Vault.
        name: vault_pki_secret_backend_crl_config
        title: vault_pki_secret_backend_crl_config resource
        examples:
            - name: crl_config
              manifest: |-
                {
                  "backend": "${vault_mount.pki.path}",
                  "disable": false,
                  "expiry": "72h"
                }
              references:
                backend: vault_mount.pki.path
              dependencies:
                vault_mount.pki: |-
                    {
                      "default_lease_ttl_seconds": 3600,
                      "max_lease_ttl_seconds": 86400,
                      "path": "%s",
                      "type": "pki"
                    }
        argumentDocs:
            auto_rebuild: '- (Optional) Enables periodic rebuilding of the CRL upon expiry. Vault 1.12+'
            auto_rebuild_grace_period: '- (Optional) Grace period before CRL expiry to attempt rebuild of CRL. Vault 1.12+'
            backend: '- (Required) The path the PKI secret backend is mounted at, with no leading or trailing /s.'
            cross_cluster_revocation: '- (Optional) Enable cross-cluster revocation request queues. Vault 1.13+'
            delta_rebuild_interval: '- (Optional) Interval to check for new revocations on, to regenerate the delta CRL.'
            disable: '- (Optional) Disables or enables CRL building.'
            enable_delta: |-
                - (Optional) Enables building of delta CRLs with up-to-date revocation information,
                augmenting the last complete CRL.  Vault 1.12+
            expiry: '- (Optional) Specifies the time until expiration.'
            max_crl_entries: |-
                - (Optional) The maximum number of entries a CRL can contain. This option exists to prevent
                accidental runaway issuance/revocation from overloading Vault. If set to -1, the limit is disabled. Vault 1.19
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            ocsp_disable: '- (Optional) Disables the OCSP responder in Vault. Vault 1.12+'
            ocsp_expiry: |-
                - (Optional) The amount of time an OCSP response can be cached for, useful for OCSP stapling
                refresh durations. Vault 1.12+
            unified_crl: '- (Optional) Enables unified CRL and OCSP building. Vault 1.13+'
            unified_crl_on_existing_paths: |-
                - (Optional) Enables serving the unified CRL and OCSP on the existing, previously
                cluster-local paths. Vault 1.13+
        importStatements: []
    vault_pki_secret_backend_intermediate_cert_request:
        subCategory: ""
        description: Generate a new private key and a CSR for signing the PKI.
        name: vault_pki_secret_backend_intermediate_cert_request
        title: vault_pki_secret_backend_intermediate_cert_request resource
        examples:
            - name: test
              manifest: |-
                {
