            ca_chain: '- The CA chain'
            cert_metadata: (Optional) - A base 64 encoded value or an empty string to associate with the certificate's serial number. The role's no_store_metadata must be set to false, otherwise an error is returned when specified.
            certificate: '- The certificate'
            common_name: '- (Required) CN of certificate to create'
            csr: '- (Required) The CSR'
            exclude_cn_from_sans: '- (Optional) Flag to exclude CN from SANs'
            expiration: '- The expiration date of the certificate in unix epoch format'
            format: '- (Optional) The format of data'
            ip_sans: '- (Optional) List of alternative IPs'
            issuer_ref: |-
                - (Optional) Specifies the default issuer of this request. Can
                be the value default, a name, or an issuer ID. Use ACLs to prevent access to
                the /pki/issuer/:issuer_ref/{issue,sign}/:name paths to prevent users
                overriding the role's issuer_ref value.
            issuing_ca: '- The issuing CA'
            min_seconds_remaining: '- (Optional) Generate a new certificate when the expiration is within this number of seconds, default is 604800 (7 days)'
            name: '- (Required) Name of the role to create the certificate against'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            not_after: '- (Optional) Set the Not After field of the certificate with specified date value. The value format should be given in UTC format YYYY-MM-ddTHH:MM:SSZ. Supports the Y10K end date for IEEE 802.1AR-2018 standard devices, 9999-12-31T23:59:59Z.'
            other_sans: '- (Optional) List of other SANs'
            remove_roots_from_chain: (Optional) - If set to true, the returned ca_chain field will not include any self-signed CA certificates. Useful if end-users already have the root CA in their trust store. Default false.
            renew_pending: '- true if the current time (during refresh) is after the start of the early renewal window declared by min_seconds_remaining, and false otherwise; if auto_renew is set to true then the provider will plan to replace the certificate once renewal is pending.'
            serial_number: '- The certificate''s serial number, hex formatted.'
            ttl: '- (Optional) Time to live'
            uri_sans: '- (Optional) List of alternative URIs'
        importStatements: []
    vault_plugin:
        subCategory: ""
        description: Manage external plugins registered in the plugin catalog.
        name: vault_plugin
        title: vault_plugin resource
        examples:
            - name: oracle
              manifest: |-
                {
                  "name": "vault-plugin-database-oracle",
                  "type": "database",
                  "version": "v0.13.0+ent"
                }
            - name: jwt
              manifest: |-
                {
                  "command": "vault-plugin-auth-jwt",
                  "env": [
                    "HTTP_PROXY=http://proxy.example.com:8080"
                  ],
                  "name": "jwt",
                  "sha256": "6bd0a803ed742aa3ce35e4fa23d2c8d550e6c1567bf63410cec489c28b68b0fc",
                  "type": "auth",
                  "version": "v0.17.0"
                }
              dependencies:
                vault_auth_backend.jwt_auth: |-
                    {
                      "type": "${vault_plugin.jwt.name}"
                    }
        argumentDocs:
            args: '- (Optional) List of additional args to pass to the plugin.'
            command: '- (Required) Command to execute the plugin, relative to the server''s configured plugin_directory. Need to be set for non-enterprise plugin.'
            env: '- (Optional) List of additional environment variables to run the plugin with in KEY=VALUE form.'
            name: '- (Required) Name of the plugin.'
            oci_image: |-
                - (Optional) Specifies OCI image to run. If specified, setting
                command, args, and env will update the container's entrypoint, args, and
                environment variables (append-only) respectively.
            runtime: '- (Optional) Vault plugin runtime to use if oci_image is specified.'
            sha256: '- (Optional) SHA256 sum of the plugin binary. Need to be set for non-enterprise plugin.'
            type: '- (Required) Type of plugin; one of "auth", "secret", or "database".'
            version: '- (Optional) Semantic version of the plugin. Required for official enterprise plugins.'
        importStatements: []
    vault_plugin_pinned_version:
        subCategory: ""
        description: Manage pinned plugin version registered in the plugin catalog.
        name: vault_plugin_pinned_version
        title: vault_plugin_pinned_version resource
        examples:
            - name: jwt_pin
              manifest: |-
                {
                  "name": "${vault_plugin.jwt.name}",
                  "type": "${vault_plugin.jwt.type}",
                  "version": "${vault_plugin.jwt.version}"
                }
              references:
                name: vault_plugin.jwt.name
                type: vault_plugin.jwt.type
                version: vault_plugin.jwt.version
              dependencies:
                vault_auth_backend.jwt_auth: |-
                    {
                      "type": "${vault_plugin_pinned_version.jwt_pin.name}"
                    }
                vault_plugin.jwt: |-
                    {
                      "command": "vault-plugin-auth-jwt",
                      "env": [
                        "HTTP_PROXY=http://proxy.example.com:8080"
                      ],
                      "name": "jwt",
                      "sha256": "6bd0a803ed742aa3ce35e4fa23d2c8d550e6c1567bf63410cec489c28b68b0fc",
                      "type": "auth",
                      "version": "v0.17.0"
                    }
        argumentDocs:
            name: '- (Required) Name of the plugin.'
            type: '- (Required) Type of plugin; one of "auth", "secret", or "database".'
            version: '- (Required) Semantic version of the plugin to pin.'
        importStatements: []
    vault_plugin_runtime:
        subCategory: ""
        description: Manages plugin runtimes in Vault's plugin runtime catalog.
        name: vault_plugin_runtime
        title: vault_plugin_runtime resource
        examples:
            - name: example
              manifest: |-
                {
                  "name": "example-runtime",
                  "oci_runtime": "runc",
                  "rootless": false,
                  "type": "container"
                }
            - name: constrained
              manifest: |-
                {
                  "cpu_nanos": 1000000000,
                  "memory_bytes": 536870912,
                  "name": "constrained-runtime",
                  "oci_runtime": "runc",
                  "rootless": true,
                  "type": "container"
                }
            - name: custom_cgroup
              manifest: |-
                {
                  "cgroup_parent": "/vault/plugins",
                  "cpu_nanos": 2000000000,
                  "memory_bytes": 1073741824,
                  "name": "custom-cgroup-runtime",
                  "oci_runtime": "runc",
                  "type": "container"
                }
        argumentDocs:
            cgroup_parent: |-
                - (Optional) The parent cgroup to set for each container.
                If not specified, defaults to the cgroup of the Vault process.
            container: runtime type requires a properly configured container runtime (e.g., Docker, containerd) on the Vault server
            cpu_nanos: |-
                - (Optional) CPU time in nanoseconds that the plugin can use per second.
                For example, 1000000000 equals 1 CPU core. This sets a CPU quota for the container.
            id: '- The ID of the plugin runtime in the format {type}/{name}.'
            memory_bytes: |-
                - (Optional) Maximum memory in bytes that the plugin can use.
                For example, 536870912 equals 512 MB. This sets a memory limit for the container.
            name: |-
                - (Required) The name of the plugin runtime.
                Changing this forces a new resource to be created.
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            oci_runtime: |-
                - (Optional) The OCI-compliant runtime to use for running plugin containers.
                Common values include runc (default) and runsc (gVisor).
            rootless: |-
                - (Optional) Whether the runtime should run the plugin as a non-root user.
                Defaults to false. When set to true, enhances security by running containers without root privileges.
            type: |-
                - (Required) The type of plugin runtime. Currently only container is supported.
                Changing this forces a new resource to be created.
        importStatements: []
    vault_policy:
        subCategory: ""
        description: Writes arbitrary policies for Vault
        name: vault_policy
        title: vault_policy resource
        examples:
            - name: example
              manifest: |-
                {
                  "name": "dev-team",
                  "policy": "path \"secret/my_app\" {\n  capabilities = [\"update\"]\n}\n"
                }
        argumentDocs:
            name: '- (Required) The name of the policy'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            policy: '- (Required) String containing a Vault policy'
        importStatements: []
    vault_quota_config:
        subCategory: ""
        description: Manage the singleton quota configuration.
        name: vault_quota_config
        title: vault_quota_config resource
        examples:
            - name: global
              manifest: |-
                {
                  "enable_rate_limit_audit_logging": true,
                  "enable_rate_limit_response_headers": true,
                  "namespace": "ns_admin"
                }
        argumentDocs:
            absolute_rate_limit_exempt_paths: '- (Optional) Set of absolute paths exempt from all rate limit quotas, qualified from the root of the namespace hierarchy. Ordering is ignored. Terraform only sends this field when it is explicitly configured. In practice, this field is effectively root-managed; administrative namespaces can read returned values but cannot reliably manage them.'
            enable_rate_limit_audit_logging: '- (Optional) Enables audit logging for requests rejected by rate limit quotas. Terraform only sends this field when it is explicitly configured. If omitted, Vault keeps its current value.'
            enable_rate_limit_response_headers: '- (Optional) Enables rate limit response headers on HTTP responses. Terraform only sends this field when it is explicitly configured. If omitted, Vault keeps its current value.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Vault Enterprise allows /sys/quotas/config to be called from the root or an administrative namespace, but support is asymmetric: administrative namespaces can update the boolean fields, while exempt-path management is effectively root-only.
                Available only for Vault Enterprise.
            rate_limit_exempt_paths: '- (Optional) Set of paths exempt from rate limit quotas relative to the current namespace context. Ordering is ignored. Terraform only sends this field when it is explicitly configured. In practice, exempt-path management is effectively root-only for this endpoint.'
        importStatements:
            - $ TERRAFORM_VAULT_NAMESPACE_IMPORT=ns_admin terraform import vault_quota_config.global sys/quotas/config
    vault_quota_lease_count:
        subCategory: ""
        description: Manage Lease Count Quota
        name: vault_quota_lease_count
        title: vault_quota_lease_count resource
        examples:
            - name: global
              manifest: |-
                {
                  "max_leases": 100,
                  "name": "global",
                  "path": ""
                }
        argumentDocs:
            inheritable: '- (Optional) If set to true on a quota where path is set to a namespace, the same quota will be cumulatively applied to all child namespace. The inheritable parameter cannot be set to true if the path does not specify a namespace. Only the quotas associated with the root namespace are inheritable by default. Requires Vault 1.15+.'
            max_leases: |-
                - (Required) The maximum number of leases to be allowed by the quota
                rule. The max_leases must be positive.
            name: '- (Required) Name of the rate limit quota'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            path: |-
                - (Optional) Path of the mount or namespace to apply the quota. A blank path configures a
                global rate limit quota. For example namespace1/ adds a quota to a full namespace,
                namespace1/auth/userpass adds a quota to userpass in namespace1.
                Updating this field on an existing quota can have "moving" effects. For example, updating
                auth/userpass to namespace1/auth/userpass moves this quota from being a global mount quota to
                a namespace specific mount quota. Note, namespaces are supported in Enterprise only.
            role: '- (Optional) If set on a quota where path is set to an auth mount with a concept of roles (such as /auth/approle/), this will make the quota restrict login requests to that mount that are made with the specified role.'
        importStatements: []
    vault_quota_rate_limit:
        subCategory: ""
        description: Manage Rate Limit Quota
        name: vault_quota_rate_limit
        title: vault_quota_rate_limit resource
        examples:
            - name: global
              manifest: |-
                {
                  "name": "global",
                  "path": "",
                  "rate": 100
                }
        argumentDocs:
            block_interval: |-
                - (Optional) If set, when a client reaches a rate limit threshold, the client will
                be prohibited from any further requests until after the 'block_interval' in seconds has elapsed.
            group_by: |-
                - (Optional) Attribute used to group requests for rate limiting. Limits are enforced independently for each
                group. Valid group_by modes are: 1) ip that groups requests by their source IP address (group_by defaults to
                ip if unset, which is the only supported mode in community edition); 2) none that groups together all requests
                that match the rate limit quota rule; 3) entity_then_ip that groups requests by their entity ID for authenticated
                requests that carry one, or by their IP for unauthenticated requests (or requests whose authentication is not
                connected to an entity); and 4) entity_then_none which also groups requests by their entity ID when available, but
                the rest is all grouped together (i.e. unauthenticated or with authentication not connected to an entity).
            inheritable: '- (Optional) If set to true on a quota where path is set to a namespace, the same quota will be cumulatively applied to all child namespace. The inheritable parameter cannot be set to true if the path does not specify a namespace. Only the quotas associated with the root namespace are inheritable by default. Requires Vault 1.15+.'
            interval: '- (Optional) The duration in seconds to enforce rate limiting for.'
            name: '- (Required) Name of the rate limit quota'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            path: |-
                - (Optional) Path of the mount or namespace to apply the quota. A blank path configures a
                global rate limit quota. For example namespace1/ adds a quota to a full namespace,
                namespace1/auth/userpass adds a quota to userpass in namespace1.
                Updating this field on an existing quota can have "moving" effects. For example, updating
                auth/userpass to namespace1/auth/userpass moves this quota from being a global mount quota to
                a namespace specific mount quota. Note, namespaces are supported in Enterprise only.
            rate: |-
                - (Required) The maximum number of requests at any given second to be allowed by the quota
                rule. The rate must be positive.
            role: '- (Optional) If set on a quota where path is set to an auth mount with a concept of roles (such as /auth/approle/), this will make the quota restrict login requests to that mount that are made with the specified role.'
            secondary_rate: |-
                - (Optional) Can only be set for the group_by modes entity_then_ip or entity_then_none. This is
                the rate limit applied to the requests that fall under the "ip" or "none" groupings, while the authenticated requests
                that contain an entity ID are subject to the rate field instead. Defaults to the same value as rate.
        importStatements: []
    vault_rabbitmq_secret_backend:
        subCategory: ""
        description: Creates an RabbitMQ secret backend for Vault.
        name: vault_rabbitmq_secret_backend
        title: vault_rabbitmq_secret_backend resource
        examples:
            - name: rabbitmq
              manifest: |-
                {
                  "connection_uri": "https://.....",
                  "password": "password",
                  "username": "user"
                }
            - name: rabbitmq
              manifest: |-
                {
                  "connection_uri": "https://.....",
                  "password_wo": "${var.rabbitmq_password}",
                  "password_wo_version": 1,
                  "username": "user"
                }
              references:
                password_wo: var.rabbitmq_password
        argumentDocs:
            allowed_managed_keys: '- (Optional) Set of managed key registry entry names that the mount in question is allowed to access'
            allowed_response_headers: |-
                - (Optional) List of headers to allow, allowing a plugin to include
                them in the response.
            audit_non_hmac_request_keys: '- (Optional) Specifies the list of keys that will not be HMAC''d by audit devices in the request data object.'
            audit_non_hmac_response_keys: '- (Optional) Specifies the list of keys that will not be HMAC''d by audit devices in the response data object.'
            connection_uri: '- (Required)  Specifies the RabbitMQ connection URI.'
            default_lease_ttl_seconds: '- (Optional) Default lease duration for tokens and secrets in seconds'
            delegated_auth_accessors: |-
                - (Optional)  List of allowed authentication mount accessors the
                backend can request delegated authentication for.
            description: '- (Optional) Human-friendly description of the mount'
            disable_remount: |-
                - (Optional) If set, opts out of mount migration on path updates.
                See here for more info on Mount Migration
            external_entropy_access: '- (Optional) Boolean flag that can be explicitly set to true to enable the secrets engine to access Vault''s external entropy source'
            identity_token_key: |-
                - (Optional)  The key to use for signing plugin workload identity tokens. If
                not provided, this will default to Vault's OIDC default key. Requires Vault Enterprise 1.16+.
            listing_visibility: |-
                - (Optional) Specifies whether to show this mount in the UI-specific
                listing endpoint. Valid values are unauth or hidden. If not set, behaves like hidden.
            local: '- (Optional) Boolean flag that can be explicitly set to true to enforce local mount in HA environment'
            max_lease_ttl_seconds: '- (Optional) Maximum possible lease duration for tokens and secrets in seconds'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            options: '- (Optional) Specifies mount type specific options that are passed to the backend'
            passthrough_request_headers: |-
                - (Optional) List of headers to allow and pass from the request to
                the plugin.
            password: |-
                - (Optional) Specifies the RabbitMQ management administrator password.
                Conflicts with password_wo.
            password_policy: '- (Optional) Specifies a password policy to use when creating dynamic credentials. Defaults to generating an alphanumeric password if not set.'
            password_wo: |-
                - (Optional) Specifies the RabbitMQ management administrator password.
                This is a write-only field and will not be read back from Vault.
                Conflicts with password.
            password_wo_version: |-
                - (Optional) A version counter for the write-only password_wo field.
                Incrementing this value will trigger an update to the password.
                Required when using password_wo.
            path: |-
                - (Optional) The unique path this backend should be mounted at. Must
                not begin or end with a /. Defaults to rabbitmq.
            plugin_version: |-
                - (Optional) Specifies the semantic version of the plugin to use, e.g. "v1.0.0".
                If unspecified, the server will select any matching unversioned plugin that may have been
                registered, the latest versioned plugin registered, or a built-in plugin in that order of precedence.
            seal_wrap: '- (Optional) Boolean flag that can be explicitly set to true to enable seal wrapping for the mount, causing values stored by the mount to be wrapped by the seal''s encryption capability'
            username: '- (Required) Specifies the RabbitMQ management administrator username.'
            username_template: '- (Optional) Template describing how dynamic usernames are generated.'
            verify_connection: |-
                - (Optional) Specifies whether to verify connection URI, username, and password.
                Defaults to true.
        importStatements: []
    vault_rabbitmq_secret_backend_role:
        subCategory: ""
        description: Creates a role on an RabbitMQ Secret Backend for Vault.
        name: vault_rabbitmq_secret_backend_role
        title: vault_rabbitmq_secret_backend_role resource
        examples:
            - name: role
              manifest: |-
                {
                  "backend": "${vault_rabbitmq_secret_backend.rabbitmq.path}",
                  "name": "deploy",
                  "tags": "tag1,tag2",
                  "vhost": [
                    {
                      "configure": "",
                      "host": "/",
                      "read": ".*",
                      "write": ""
                    }
                  ],
                  "vhost_topic": [
                    {
                      "host": "/",
                      "vhost": [
                        {
                          "read": ".*",
                          "topic": "amq.topic",
                          "write": ""
                        }
                      ]
                    }
                  ]
                }
              references:
                backend: vault_rabbitmq_secret_backend.rabbitmq.path
              dependencies:
                vault_rabbitmq_secret_backend.rabbitmq: |-
                    {
                      "connection_uri": "https://.....",
                      "password": "password",
                      "username": "user"
                    }
        argumentDocs:
            backend: |-
                - (Required) The path the RabbitMQ secret backend is mounted at,
                with no leading or trailing /s.
            name: |-
                - (Required) The name to identify this role within the backend.
                Must be unique within the backend.
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            tags: '- (Optional) Specifies a comma-separated RabbitMQ management tags.'
            vhost: '- (Optional) Specifies a map of virtual hosts to permissions.'
            vhost_topic: '- (Optional) Specifies a map of virtual hosts and exchanges to topic permissions. This option requires RabbitMQ 3.7.0 or later.'
        importStatements: []
    vault_raft_autopilot:
        subCategory: ""
        description: Configures Raft's Autopilot capabilities.
        name: vault_raft_autopilot
        title: vault_raft_autopilot resource
        examples:
            - name: autopilot
              manifest: |-
                {
                  "cleanup_dead_servers": true,
                  "dead_server_last_contact_threshold": "24h0m0s",
                  "last_contact_threshold": "10s",
                  "max_trailing_logs": 1000,
                  "min_quorum": 3,
                  "server_stabilization_time": "10s"
                }
        argumentDocs:
            cleanup_dead_servers: |-
                – (Optional) Specifies whether to remove dead server nodes
                periodically or when a new server joins. This requires that min-quorum is also set.
            dead_server_last_contact_threshold: |-
                - (Optional) Limit the amount of time a
                server can go without leader contact before being considered failed. This only takes
                effect when cleanup_dead_servers is set.
            disable_upgrade_migration: – (Optional) Disables automatically upgrading Vault using autopilot. (Enterprise-only)
            last_contact_threshold: |-
                - (Optional) Limit the amount of time a server can go
                without leader contact before being considered unhealthy.
            max_trailing_logs: |-
                - (Optional) Maximum number of log entries in the Raft log
                that a server can be behind its leader before being considered unhealthy.
            min_quorum: |-
                - (Optional) Minimum number of servers allowed in a cluster before
                autopilot can prune dead servers. This should at least be 3. Applicable only for
                voting nodes.
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            server_stabilization_time: |-
                - (Optional) Minimum amount of time a server must be
                stable in the 'healthy' state before being added to the cluster.
        importStatements: []
    vault_raft_snapshot_agent_config:
        subCategory: ""
        description: Creates a Raft Snapshot Agent Configuration for Vault.
        name: vault_raft_snapshot_agent_config
        title: vault_raft_snapshot_agent_config resource
        examples:
            - name: local_backups
              manifest: |-
                {
                  "interval_seconds": 86400,
                  "local_max_space": 10000000,
                  "name": "local",
                  "path_prefix": "/opt/vault/snapshots/",
                  "retain": 7,
                  "storage_type": "local"
                }
            - name: s3_backups
              manifest: |-
                {
                  "aws_access_key_id": "${var.aws_access_key_id}",
                  "aws_s3_bucket": "my-bucket",
                  "aws_s3_enable_kms": true,
                  "aws_s3_region": "${data.aws_region.current.name}",
                  "aws_secret_access_key": "${var.aws_secret_access_key}",
                  "interval_seconds": 86400,
                  "name": "s3",
                  "path_prefix": "/path/in/bucket",
                  "retain": 7,
                  "storage_type": "aws-s3"
                }
              references:
                aws_access_key_id: var.aws_access_key_id
                aws_s3_region: data.aws_region.current.name
                aws_secret_access_key: var.aws_secret_access_key
            - name: azure_backups
              manifest: |-
                {
                  "autoload_enabled": true,
                  "azure_account_key": "${var.azure_account_key}",
                  "azure_account_name": "${var.azure_account_name}",
                  "azure_auth_mode": "shared",
                  "azure_container_name": "vault-blob",
                  "interval_seconds": 86400,
                  "name": "azure_backup",
                  "path_prefix": "/",
                  "retain": 7,
                  "storage_type": "azure-blob"
                }
              references:
                azure_account_key: var.azure_account_key
                azure_account_name: var.azure_account_name
            - name: azure_managed_identity
              manifest: |-
                {
                  "autoload_enabled": true,
                  "azure_account_name": "${var.azure_account_name}",
                  "azure_auth_mode": "managed",
                  "azure_client_id": "${var.azure_client_id}",
                  "azure_container_name": "vault-blob",
                  "interval_seconds": 86400,
                  "name": "azure_managed",
                  "path_prefix": "/",
                  "retain": 7,
                  "storage_type": "azure-blob"
                }
              references:
                azure_account_name: var.azure_account_name
                azure_client_id: var.azure_client_id
        argumentDocs:
            autoload_enabled: |-
                - (Optional) Have Vault automatically load the latest snapshot after it is written. This will replace the previously loaded snapshot. Note that this does not mean the snapshot is automatically applied to the cluster, it is just loaded and available for recovery operations.
                Note: Not supported with storage_type = "local".
            aws_access_key_id: '- AWS access key ID.'
            aws_s3_bucket: <required> - S3 bucket to write snapshots to.
            aws_s3_disable_tls: |-
                - Disable TLS for the S3 endpoint. This
                should only be used for testing purposes, typically in conjunction with
                aws_s3_endpoint.
            aws_s3_enable_kms: '- Use KMS to encrypt bucket contents.'
            aws_s3_endpoint: |-
                - AWS endpoint. This is typically only set when
                using a non-AWS S3 implementation like Minio.
            aws_s3_force_path_style: |-
                - Use the endpoint/bucket URL style
                instead of bucket.endpoint. May be needed when setting aws_s3_endpoint.
            aws_s3_kms_key: '- Use named KMS key, when aws_s3_enable_kms = true'
            aws_s3_region: <required> - AWS region bucket is in.
            aws_s3_server_side_encryption: '- Use AES256 to encrypt bucket contents.'
            aws_secret_access_key: '- AWS secret access key.'
            aws_session_token: '- AWS session token.'
            azure_account_key: '- Azure account key. Required when azure_auth_mode = "shared".'
            azure_account_name: '- Azure account name.'
            azure_auth_mode: '- Azure authentication mode. Required by Vault API when using storage_type = "azure-blob". Possible values are:'
            azure_blob_environment: '- Azure blob environment.'
            azure_client_id: |-
                - Azure client ID for authentication. Required when azure_auth_mode = "managed".
                Requires Vault Enterprise 1.18.0+.
            azure_container_name: |-
                <required> - Azure container name to write
                snapshots to.
            azure_endpoint: |-
                - Azure blob storage endpoint. This is typically
                only set when using a non-Azure implementation like Azurite.
            environment: '- Environment-based credentials using Azure SDK default credential chain. If environment is set, Azure authentication details are retrieved from the environment variables: AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID.'
            file_prefix: |-
                - Within the directory or bucket
                prefix given by path_prefix, the file or object name of snapshot files
                will start with this string.
            google_disable_tls: |-
                - Disable TLS for the GCS endpoint. This
                should only be used for testing purposes, typically in conjunction with
                google_endpoint.
            google_endpoint: |-
                - GCS endpoint. This is typically only set when
                using a non-Google GCS implementation like fake-gcs-server.
            google_gcs_bucket: <required> - GCS bucket to write snapshots to.
            google_service_account_key: |-
                - Google service account key in JSON format.
                The raw value looks like this:
            interval_seconds: <required> - Time (in seconds) between snapshots.
            local_max_space: |-
                - For storage_type = local, the maximum
                space, in bytes, to use for snapshots. Snapshot attempts will fail if there is not enough
                space left in this allowance.
            managed: '- Managed identity authentication (requires azure_client_id)'
            name: <required> – Name of the configuration to modify.
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            path_prefix: |-
                <required> - For storage_type = "local", the directory to
                write the snapshots in. For cloud storage types, the bucket prefix to use.
                Types azure-s3 and google-gcs require a trailing / (slash).
                Types local and aws-s3 the trailing / is optional.
            retain: |-
                - How many snapshots are to be kept; when writing a
                snapshot, if there are more snapshots already stored than this number, the
                oldest ones will be deleted.
            shared: '- Shared key authentication (requires azure_account_key)'
            storage_type: |-
                <required> - One of "local", "azure-blob", "aws-s3",
                or "google-gcs". The remaining parameters described below are all specific to
                the selected storage_type and prefixed accordingly.
        importStatements: []
    vault_rgp_policy:
        subCategory: ""
        description: Writes Sentinel role governing policies for Vault
        name: vault_rgp_policy
        title: vault_rgp_policy resource
        examples:
            - name: allow-all
              manifest: |-
                {
                  "enforcement_level": "soft-mandatory",
                  "name": "allow-all",
                  "policy": "main = rule {\n  true\n}\n"
                }
        argumentDocs:
            enforcement_level: '- (Required) Enforcement level of Sentinel policy. Can be either advisory or soft-mandatory or hard-mandatory'
            name: '- (Required) The name of the policy'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            policy: '- (Required) String containing a Sentinel policy'
        importStatements: []
    vault_rotation_policy:
        subCategory: ""
        description: Writes rotation policies for Vault
        name: vault_rotation_policy
        title: vault_rotation_policy resource
        examples:
            - name: example
              manifest: |-
                {
                  "max_retries_per_cycle": 6,
                  "max_retry_cycles": 3,
                  "name": "database-admin-retry-policy"
                }
        argumentDocs:
            max_retries_per_cycle: '- (Required) Maximum retries per cycle for this rotation policy.'
            max_retry_cycles: '- (Required) Maximum retry cycles for this rotation policy.'
            name: '- (Required) The name of the rotation policy.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
        importStatements: []
    vault_saml_auth_backend:
        subCategory: ""
        description: Manages SAML Auth mounts in Vault.
        name: vault_saml_auth_backend
        title: vault_saml_auth_backend resource
        examples:
            - name: test
              manifest: |-
                {
                  "acs_urls": [
                    "https://my.vault.primary/v1/auth/saml/callback"
                  ],
                  "default_role": "admin",
                  "entity_id": "https://my.vault/v1/auth/saml",
                  "idp_metadata_url": "https://company.okta.com/app/abc123eb9xnIfzlaf697/sso/saml/metadata",
                  "path": "saml"
                }
        argumentDocs:
            acs_urls: |-
                - (Optional) The well-formatted URLs of your Assertion Consumer Service (ACS)
                that should receive a response from the identity provider.
            default_role: '- (Optional) The role to use if no role is provided during login.'
            disable_remount: |-
                - (Optional) If set to true, opts out of mount migration on path updates.
                See here for more info on Mount Migration
            entity_id: '- (Optional) The entity ID of the SAML authentication service provider.'
            idp_cert: |-
                (Optional) The PEM encoded certificate of the identity provider. Mutually exclusive
                with idp_metadata_url.
            idp_entity_id: |-
                (Optional) The entity ID of the identity provider. Mutually exclusive with
                idp_metadata_url.
            idp_metadata_url: '- (Optional) The metadata URL of the identity provider.'
            idp_sso_url: |-
                (Optional) The SSO URL of the identity provider. Mutually exclusive with
                idp_metadata_url.
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            path: |-
                - (Optional) Path where the auth backend will be mounted. Defaults to auth/saml
                if not specified.
            tune: '- (Optional) Extra configuration block. Structure is documented below.'
            tune.allowed_response_headers: |-
                - (Optional) List of headers to whitelist and allowing
                a plugin to include them in the response.
            tune.audit_non_hmac_request_keys: |-
                - (Optional) Specifies the list of keys that will
                not be HMAC'd by audit devices in the request data object.
            tune.audit_non_hmac_response_keys: |-
                - (Optional) Specifies the list of keys that will
                not be HMAC'd by audit devices in the response data object.
            tune.default_lease_ttl: |-
                - (Optional) Specifies the default time-to-live.
                If set, this overrides the global default.
                Must be a valid duration string
            tune.listing_visibility: |-
                - (Optional) Specifies whether to show this mount in
                the UI-specific listing endpoint. Valid values are "unauth" or "hidden".
            tune.max_lease_ttl: |-
                - (Optional) Specifies the maximum time-to-live.
                If set, this overrides the global default.
                Must be a valid duration string
            tune.passthrough_request_headers: |-
                - (Optional) List of headers to whitelist and
                pass from the request to the backend.
            tune.token_type: |-
                - (Optional) Specifies the type of tokens that should be returned by
                the mount. Valid values are "default-service", "default-batch", "service", "batch".
            validate_assertion_signature: |-
                - (Optional) If set to true, validates the signature of
                the SAML assertion. Defaults to false. Requires Vault 1.19+.
            validate_response_signature: |-
                - (Optional) If set to true, validates the signature of
                the SAML response. Defaults to false. Requires Vault 1.19+.
            verbose_logging: |-
                - (Optional) If set to true, logs additional, potentially sensitive
                information during the SAML exchange according to the current logging level. Not
                recommended for production.
        importStatements: []
    vault_saml_auth_backend_role:
        subCategory: ""
        description: Manages SAML auth backend roles in Vault.
        name: vault_saml_auth_backend_role
        title: vault_saml_auth_backend_role resource
        examples:
            - name: example
              manifest: |-
                {
                  "bound_attributes": {
                    "group": "admin"
                  },
                  "bound_subjects": [
                    "*example.com"
                  ],
                  "groups_attribute": "groups",
                  "name": "my-role",
                  "path": "${vault_saml_auth_backend.example.path}",
                  "token_policies": [
                    "writer"
                  ],
                  "token_ttl": 86400
                }
              references:
                path: vault_saml_auth_backend.example.path
              dependencies:
                vault_saml_auth_backend.example: |-
                    {
                      "acs_urls": [
                        "https://my.vault.primary/v1/auth/saml/callback"
                      ],
                      "default_role": "default-role",
                      "entity_id": "https://my.vault/v1/auth/saml",
                      "idp_metadata_url": "https://company.okta.com/app/abc123eb9xnIfzlaf697/sso/saml/metadata",
                      "path": "saml"
                    }
        argumentDocs:
            bound_attributes: |-
                - (Optional) Mapping of attribute names to values that are expected to
                exist in the SAML assertion.
            bound_attributes_type: |-
                - (Optional) The type of matching assertion to perform on
                bound_attributes_type.
            bound_subjects: '- (Optional) List of subjects being asserted for SAML authentication.'
            bound_subjects_type: '- (Optional) The type of matching assertion to perform on bound_subjects.'
            groups_attribute: |-
                - (Optional) The attribute to use to identify the set of groups to which the
                user belongs.
            name: '- (Required) Unique name of the role.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            path: '- (Required) Path where the auth backend is mounted.'
            token_bound_cidrs: |-
                - (Optional) List of CIDR blocks; if set, specifies blocks of IP
                addresses which can authenticate successfully, and ties the resulting token to these blocks
                as well.
            token_explicit_max_ttl: |-
                - (Optional) If set, will encode an
                explicit max TTL
                onto the token in number of seconds. This is a hard cap even if token_ttl and
                token_max_ttl would otherwise allow a renewal.
            token_max_ttl: |-
                - (Optional) The maximum lifetime for generated tokens in number of seconds.
                Its current value will be referenced at renewal time.
            token_no_default_policy: |-
                - (Optional) If set, the default policy will not be set on
                generated tokens; otherwise it will be added to the policies set in token_policies.
            token_num_uses: |-
                - (Optional) The maximum number
                of times a generated token may be used (within its lifetime); 0 means unlimited.
            token_period: |-
                - (Optional) If set, indicates that the
                token generated using this role should never expire. The token should be renewed within the
                duration specified by this value. At each renewal, the token's TTL will be set to the
                value of this field. Specified in seconds.
            token_policies: |-
                - (Optional) List of policies to encode onto generated tokens. Depending
                on the auth method, this list may be supplemented by user/group/other values.
            token_ttl: |-
                - (Optional) The incremental lifetime for generated tokens in number of seconds.
                Its current value will be referenced at renewal time.
            token_type: |-
                - (Optional) The type of token that should be generated. Can be service,
                batch, or default to use the mount's tuned default (which unless changed will be
                service tokens). For token store roles, there are two additional possibilities:
                default-service and default-batch which specify the type to return unless the client
                requests a different type at generation time.
        importStatements: []
    vault_scep_auth_backend_role:
