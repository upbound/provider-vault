                        "local-exec": [
                          {
                            "command": "(\n      mkdir -p /tmp/acme-challenge/.well-known/acme-challenge\n      /bin/echo -n '${data.vault_pki_external_ca_secret_backend_order_challenge.example.key_authorization}' \u003e /tmp/acme-challenge/.well-known/acme-challenge/${data.vault_pki_external_ca_secret_backend_order_challenge.example.token}\n      cd /tmp/acme-challenge \n      (nohup python3 -m http.server 5002 \u003e/dev/null 2\u003e\u00261) \u0026 \n      echo $! \u003e /tmp/acme-challenge-server.pid\n      sleep 2\n) \u0026\n"
                          },
                          {
                            "command": "if [ -f /tmp/acme-challenge-server.pid ]; then\n  kill $(cat /tmp/acme-challenge-server.pid) 2\u003e/dev/null || true\n  rm -f /tmp/acme-challenge-server.pid\nfi\nrm -rf /tmp/acme-challenge\n",
                            "when": "${destroy}"
                          }
                        ]
                      },
                      "triggers": {
                        "key_authorization": "${data.vault_pki_external_ca_secret_backend_order_challenge.example.key_authorization}",
                        "token": "${data.vault_pki_external_ca_secret_backend_order_challenge.example.token}"
                      }
                    }
                vault_mount.pki-external-ca: |-
                    {
                      "path": "pki-external-ca",
                      "type": "pki-external-ca"
                    }
                vault_pki_external_ca_secret_backend_acme_account.example: |-
                    {
                      "directory_url": "https://acme-v02.api.letsencrypt.org/directory",
                      "email_contacts": [
                        "admin@example.com"
                      ],
                      "mount": "${vault_mount.pki-external-ca.path}",
                      "name": "my-acme-account"
                    }
                vault_pki_external_ca_secret_backend_order.example: |-
                    {
                      "identifiers": [
                        "www.example.com"
                      ],
                      "mount": "${vault_mount.pki-external-ca.path}",
                      "role_name": "${vault_pki_external_ca_secret_backend_role.example.name}"
                    }
                vault_pki_external_ca_secret_backend_order_challenge_fulfilled.example: |-
                    {
                      "challenge_type": "http-01",
                      "depends_on": [
                        "${null_resource.acme_challenge_server}"
                      ],
                      "identifier": "www.example.com",
                      "mount": "${vault_mount.pki-external-ca.path}",
                      "order_id": "${vault_pki_external_ca_secret_backend_order.example.order_id}",
                      "role_name": "${vault_pki_external_ca_secret_backend_role.example.name}"
                    }
                vault_pki_external_ca_secret_backend_role.example: |-
                    {
                      "acme_account_name": "${vault_pki_external_ca_secret_backend_acme_account.example.name}",
                      "allowed_domain_options": [
                        "bare_domains",
                        "subdomains"
                      ],
                      "allowed_domains": [
                        "example.com"
                      ],
                      "mount": "${vault_mount.pki-external-ca.path}",
                      "name": "example-role"
                    }
        argumentDocs:
            ca_chain: '- List of PEM-encoded certificates in the CA chain.'
            certificate: '- The PEM-encoded certificate issued by the external CA.'
            id: '- The ID of the resource in the format <mount>/role/<role_name>/order/<order_id>/certificate.'
            mount: '- (Required) The path where the PKI External CA secret backend is mounted.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            order_id: '- (Required) The unique identifier for the ACME order.'
            private_key: '- The PEM-encoded private key. This is only available if the order was created using the identifier workflow (not with a CSR). If a CSR was provided, the private key must be managed separately.'
            role_name: '- (Required) Name of the role associated with the order.'
            serial_number: '- The serial number of the issued certificate.'
        importStatements: []
    vault_pki_external_ca_secret_backend_order_challenge_fulfilled:
        subCategory: ""
        description: Marks an ACME challenge as fulfilled for a specific identifier in an order.
        name: vault_pki_external_ca_secret_backend_order_challenge_fulfilled
        title: vault_pki_external_ca_secret_backend_order_challenge_fulfilled resource
        examples:
            - name: example
              manifest: |-
                {
                  "challenge_type": "http-01",
                  "depends_on": [
                    "${local_file.challenge}"
                  ],
                  "identifier": "www.example.com",
                  "mount": "${vault_mount.pki-external-ca.path}",
                  "order_id": "${vault_pki_external_ca_secret_backend_order.example.order_id}",
                  "role_name": "${vault_pki_external_ca_secret_backend_role.example.name}"
                }
              references:
                mount: vault_mount.pki-external-ca.path
                order_id: vault_pki_external_ca_secret_backend_order.example.order_id
                role_name: vault_pki_external_ca_secret_backend_role.example.name
              dependencies:
                local_file.challenge: |-
                    {
                      "content": "${data.vault_pki_external_ca_secret_backend_order_challenge.example.key_authorization}",
                      "filename": "/var/www/html/.well-known/acme-challenge/${data.vault_pki_external_ca_secret_backend_order_challenge.example.token}"
                    }
                vault_mount.pki-external-ca: |-
                    {
                      "path": "pki-external-ca",
                      "type": "pki-external-ca"
                    }
                vault_pki_external_ca_secret_backend_acme_account.example: |-
                    {
                      "directory_url": "https://acme-v02.api.letsencrypt.org/directory",
                      "email_contacts": [
                        "admin@example.com"
                      ],
                      "mount": "${vault_mount.pki-external-ca.path}",
                      "name": "my-acme-account"
                    }
                vault_pki_external_ca_secret_backend_order.example: |-
                    {
                      "identifiers": [
                        "www.example.com"
                      ],
                      "mount": "${vault_mount.pki-external-ca.path}",
                      "role_name": "${vault_pki_external_ca_secret_backend_role.example.name}"
                    }
                vault_pki_external_ca_secret_backend_role.example: |-
                    {
                      "acme_account_name": "${vault_pki_external_ca_secret_backend_acme_account.example.name}",
                      "allowed_challenge_types": [
                        "http-01"
                      ],
                      "allowed_domain_options": [
                        "bare_domains",
                        "subdomains"
                      ],
                      "allowed_domains": [
                        "example.com"
                      ],
                      "mount": "${vault_mount.pki-external-ca.path}",
                      "name": "example-role"
                    }
            - name: dns
              manifest: |-
                {
                  "challenge_type": "dns-01",
                  "depends_on": [
                    "${aws_route53_record.acme_challenge}"
                  ],
                  "identifier": "www.example.com",
                  "mount": "${vault_mount.pki-external-ca.path}",
                  "order_id": "${vault_pki_external_ca_secret_backend_order.example.order_id}",
                  "role_name": "${vault_pki_external_ca_secret_backend_role.example.name}"
                }
              references:
                mount: vault_mount.pki-external-ca.path
                order_id: vault_pki_external_ca_secret_backend_order.example.order_id
                role_name: vault_pki_external_ca_secret_backend_role.example.name
              dependencies:
                aws_route53_record.acme_challenge: |-
                    {
                      "name": "_acme-challenge.www.example.com",
                      "records": [
                        "${data.vault_pki_external_ca_secret_backend_order_challenge.dns.key_authorization}"
                      ],
                      "ttl": 60,
                      "type": "TXT",
                      "zone_id": "${aws_route53_zone.example.zone_id}"
                    }
        argumentDocs:
            challenge_type: '- (Required) The type of ACME challenge that was fulfilled. Valid values are http-01, dns-01, tls-alpn-01.'
            id: '- The ID of the resource in the format <mount>/role/<role_name>/order/<order_id>/fulfilled-challenge/<challenge_type>/<identifier>.'
            identifier: '- (Required) The identifier (domain name) for which the challenge was fulfilled.'
            mount: '- (Required) The path where the PKI External CA secret backend is mounted.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            order_id: '- (Required) The unique identifier for the ACME order.'
            role_name: '- (Required) Name of the role associated with the order.'
        importStatements: []
    vault_pki_external_ca_secret_backend_role:
        subCategory: ""
        description: Manages PKI External CA roles for certificate issuance via ACME.
        name: vault_pki_external_ca_secret_backend_role
        title: vault_pki_external_ca_secret_backend_role resource
        examples:
            - name: example
              manifest: |-
                {
                  "acme_account_name": "${vault_pki_external_ca_secret_backend_acme_account.example.name}",
                  "allowed_challenge_types": [
                    "http-01",
                    "dns-01"
                  ],
                  "allowed_domain_options": [
                    "bare_domains",
                    "subdomains",
                    "wildcards"
                  ],
                  "allowed_domains": [
                    "example.com",
                    "*.example.com"
                  ],
                  "mount": "${vault_mount.pki-external-ca.path}",
                  "name": "example-role"
                }
              references:
                acme_account_name: vault_pki_external_ca_secret_backend_acme_account.example.name
                mount: vault_mount.pki-external-ca.path
              dependencies:
                vault_mount.pki-external-ca: |-
                    {
                      "path": "pki-external-ca",
                      "type": "pki-external-ca"
                    }
                vault_pki_external_ca_secret_backend_acme_account.example: |-
                    {
                      "directory_url": "https://acme-v02.api.letsencrypt.org/directory",
                      "email_contacts": [
                        "admin@example.com"
                      ],
                      "mount": "${vault_mount.pki-external-ca.path}",
                      "name": "my-acme-account"
                    }
            - name: templated
              manifest: |-
                {
                  "acme_account_name": "${vault_pki_external_ca_secret_backend_acme_account.example.name}",
                  "allowed_domain_options": [
                    "bare_domains"
                  ],
                  "allowed_domains": [
                    "{{identity.entity.aliases.auth_userpass_xxxxx.name}}.example.com"
                  ],
                  "csr_generate_key_type": "rsa-2048",
                  "csr_identifier_population": "cn_first",
                  "mount": "${vault_mount.pki-external-ca.path}",
                  "name": "user-role"
                }
              references:
                acme_account_name: vault_pki_external_ca_secret_backend_acme_account.example.name
                mount: vault_mount.pki-external-ca.path
        argumentDocs:
            acme_account_name: '- (Required) The ACME account to use when validating certificates.'
            allowed_challenge_types: '- (Optional) The list of challenge types that are allowed to be used. Valid values are http-01, dns-01, tls-alpn-01. Defaults to all challenge types.'
            allowed_domain_options: '- (Optional) A list of keyword options that influence how values within allowed_domains are interpreted against the requested set of identifiers from the client. Valid values are:'
            allowed_domains: '- (Optional) A list of domains the role will accept certificates for. May contain templates, as with ACL Path Templating (e.g., {{identity.entity.aliases.<mount accessor>.name}}).'
            bare_domains: '- Allow exact domain matches'
            cn_first: '- Use the first identifier as the Common Name and all identifiers as SANs'
            creation_date: '- The date and time the role was created in RFC3339 format.'
            csr_generate_key_type: '- (Optional) The key type and size/parameters to use when generating a new key if running in the identifier workflow. Valid values are ec-256, ec-384, ec-521, rsa-2048, rsa-4096. Defaults to ec-256.'
            csr_identifier_population: '- (Optional) The technique used to populate a CSR from the provided identifiers in the identifier workflow. Valid values are:'
            force: '- (Optional) Force deletion even when active orders exist. Defaults to false.'
            globs: '- Allow glob patterns in domain names'
            id: '- The ID of the resource in the format <mount>/role/<name>.'
            last_update_date: '- The date and time the role was last updated in RFC3339 format.'
            mount: '- (Required) The path where the PKI External CA secret backend is mounted.'
            name: '- (Required) Name of the role. Must be unique within the backend.'
            namespace: |-
                - (Optional) The namespace to provision the resource in.
                The value should not contain leading or trailing forward slashes.
                The namespace is always relative to the provider's configured namespace.
                Available only for Vault Enterprise.
            sans_only: '- Use all identifiers as SANs only (no CN)'
            subdomains: '- Allow subdomains of the specified domains'
            wildcards: '- Allow wildcard certificates'
        importStatements: []
    vault_pki_secret_backend_acme_eab:
